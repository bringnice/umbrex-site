<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Мины — Umbrex</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0d0b18;
  --card: #131120;
  --card2: #1a1730;
  --border: #2d2850;
  --purple: #8b5cf6;
  --purple-light: #a78bfa;
  --purple-dark: #5b21b6;
  --purple-glow: rgba(139,92,246,0.4);
  --green: #34d399;
  --green-glow: rgba(52,211,153,0.3);
  --red: #f87171;
  --red-glow: rgba(248,113,113,0.3);
  --text: #f0eeff;
  --muted: #6d6a8a;
  --muted2: #4a4870;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding-bottom: 20px;
  overflow-x: hidden;
}

/* Фоновые блики */
body::before {
  content: '';
  position: fixed;
  top: -200px; left: -100px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(139,92,246,0.08) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -150px; right: -100px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(91,33,182,0.07) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

/* ── Хедер ── */
.header {
  position: relative;
  z-index: 10;
  padding: 16px 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.balance-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px 16px;
}
.balance-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
.balance-amount {
  font-size: 20px;
  font-weight: 800;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 2px;
}
.balance-amount .coin { font-size: 16px; }

.header-title { text-align: center; }
.header-title h1 { font-size: 18px; font-weight: 800; letter-spacing: 0.3px; }
.header-title p { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 1px; }

.rules-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
}

/* ── Настройки ── */
.settings {
  position: relative;
  z-index: 10;
  margin: 0 12px 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 16px;
}

.settings-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.setting-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.setting-row:last-child { margin-bottom: 0; }

.setting-label {
  font-size: 12px;
  color: var(--muted);
  min-width: 48px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}

.chips {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  flex: 1;
}

.chip {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 11px;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.chip.active {
  background: rgba(139,92,246,0.2);
  border-color: var(--purple);
  color: var(--purple-light);
  box-shadow: 0 0 12px var(--purple-glow);
}
.chip:active { transform: scale(0.93); }

.bet-input-wrap {
  display: flex;
  align-items: center;
  gap: 5px;
  flex: 1;
}

#bet-input {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 15px;
  font-weight: 700;
  width: 0;
  flex: 1;
  padding: 7px 10px;
  text-align: center;
  outline: none;
  transition: border-color 0.15s;
}
#bet-input:focus { border-color: var(--purple); box-shadow: 0 0 8px var(--purple-glow); }

.bet-mod {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 9px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  padding: 7px 9px;
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
}
.bet-mod:active { border-color: var(--purple); color: var(--purple-light); }

/* ── Поле ── */
.grid-wrap {
  position: relative;
  z-index: 10;
  margin: 0 12px 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 14px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}

.cell {
  aspect-ratio: 1;
  border-radius: 12px;
  background: var(--card2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.12s, background 0.2s, border-color 0.2s, box-shadow 0.2s;
  user-select: none;
  -webkit-user-select: none;
  position: relative;
  overflow: hidden;
  font-size: 22px;
}

/* глянцевый блик сверху */
.cell::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 40%;
  background: linear-gradient(180deg, rgba(255,255,255,0.055) 0%, transparent 100%);
  border-radius: 12px 12px 0 0;
  pointer-events: none;
}

.cell.hidden { color: var(--muted2); }
.cell.hidden:active { transform: scale(0.88); background: #211e38; }

.cell.gem {
  background: linear-gradient(145deg, #0d2e24, #0f3a2d);
  border-color: var(--green);
  box-shadow: 0 0 16px var(--green-glow);
  animation: popIn 0.3s cubic-bezier(.36,.07,.19,.97);
}

.cell.mine {
  background: linear-gradient(145deg, #1f1240, #2a1856);
  border-color: var(--purple);
  box-shadow: 0 0 14px var(--purple-glow);
}

.cell.exploded {
  background: linear-gradient(145deg, #2e0f0f, #3d1212);
  border-color: var(--red);
  box-shadow: 0 0 20px var(--red-glow);
  animation: boom 0.4s ease;
}

.cell.disabled { cursor: default; pointer-events: none; }

@keyframes popIn {
  0%   { transform: scale(0.7); opacity: 0.4; }
  65%  { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes boom {
  0%   { transform: scale(1.15) rotate(-5deg); }
  30%  { transform: scale(0.88) rotate(4deg); }
  65%  { transform: scale(1.04) rotate(-2deg); }
  100% { transform: scale(1) rotate(0); }
}

/* ── Инфо ── */
.info-row {
  position: relative;
  z-index: 10;
  margin: 0 12px 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 12px 16px;
  display: flex;
  gap: 0;
}

.info-item {
  flex: 1;
  text-align: center;
  position: relative;
}
.info-item + .info-item::before {
  content: '';
  position: absolute;
  left: 0; top: 10%; bottom: 10%;
  width: 1px;
  background: var(--border);
}

.info-val {
  font-size: 20px;
  font-weight: 800;
  color: var(--purple-light);
  text-shadow: 0 0 12px var(--purple-glow);
}
.info-lbl {
  font-size: 10px;
  color: var(--muted);
  margin-top: 3px;
  text-transform: uppercase;
  letter-spacing: 0.7px;
}

/* ── Кнопки ── */
.btn-row {
  position: relative;
  z-index: 10;
  padding: 0 12px;
  display: flex;
  gap: 8px;
}

.btn {
  flex: 1;
  padding: 16px;
  border: none;
  border-radius: 16px;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  letter-spacing: 0.2px;
  transition: transform 0.1s, box-shadow 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn:active { transform: scale(0.95); }
.btn:disabled { opacity: 0.35; cursor: default; }

.btn-start {
  background: linear-gradient(135deg, #7c3aed, #5b21b6);
  color: #fff;
  box-shadow: 0 6px 24px rgba(124,58,237,0.45);
}
.btn-start:not(:disabled):hover { box-shadow: 0 6px 32px rgba(124,58,237,0.6); }

.btn-cashout {
  background: linear-gradient(135deg, #059669, #047857);
  color: #fff;
  box-shadow: 0 6px 24px rgba(5,150,105,0.35);
}
.btn-cashout:not(:disabled) { box-shadow: 0 6px 24px rgba(5,150,105,0.35); }

/* ── Оверлей результата ── */
.result-overlay {
  position: fixed;
  inset: 0;
  background: rgba(13,11,24,0.88);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.result-overlay.show { opacity: 1; pointer-events: all; }

.result-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 36px 28px 28px;
  text-align: center;
  width: 88%;
  max-width: 320px;
  transform: scale(0.8) translateY(30px);
  transition: transform 0.32s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 0 80px rgba(139,92,246,0.18);
}
.result-overlay.show .result-card { transform: scale(1) translateY(0); }

.result-icon { font-size: 64px; line-height: 1; margin-bottom: 16px; }
.result-title { font-size: 26px; font-weight: 900; margin-bottom: 8px; letter-spacing: -0.3px; }
.result-title.win { color: var(--green); }
.result-title.lose { color: var(--red); }
.result-amt { font-size: 32px; font-weight: 900; margin-bottom: 4px; }
.result-amt.win { color: var(--purple-light); text-shadow: 0 0 20px var(--purple-glow); }
.result-amt.lose { color: var(--red); }
.result-mult { font-size: 14px; color: var(--muted); margin-bottom: 24px; }

.btn-again {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #7c3aed, #5b21b6);
  color: #fff;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(124,58,237,0.4);
  transition: transform 0.1s;
}
.btn-again:active { transform: scale(0.96); }

/* ── Тост ── */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 11px 22px;
  border-radius: 24px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  transition: all 0.28s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 200;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Разделитель ── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 12px 0;
  opacity: 0.5;
}
</style>
</head>
<body>

<!-- Хедер -->
<div class="header">
  <div class="balance-card">
    <div class="balance-label">Баланс</div>
    <div class="balance-amount">
      <span id="balance-val">—</span>
      <span class="coin">🪙</span>
    </div>
  </div>
  <div class="header-title">
    <h1>Umbrex</h1>
    <p>Мини-игра</p>
  </div>
  <div class="rules-btn" onclick="showToast('1 мина — ×1.06 за алмаз. Больше мин = больше риск и множитель')">
    ℹ️ Правила
  </div>
</div>

<!-- Настройки -->
<div class="settings" id="settings-panel">
  <div class="settings-title">💣 Мины</div>

  <div class="setting-row">
    <span class="setting-label">Ставка</span>
    <div class="bet-input-wrap">
      <button class="bet-mod" onclick="multBet(0.5)">½</button>
      <button class="bet-mod" onclick="multBet(2)">×2</button>
      <input id="bet-input" type="number" value="500" min="100" step="100">
      <button class="bet-mod" onclick="setBetAll()">MAX</button>
    </div>
  </div>

  <div class="setting-row">
    <span class="setting-label">Мины</span>
    <div class="chips" id="mines-opts"></div>
  </div>
</div>

<!-- Поле -->
<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<!-- Инфо (во время игры) -->
<div class="info-row" id="info-row" style="display:none">
  <div class="info-item">
    <div class="info-val" id="info-mult">×1.00</div>
    <div class="info-lbl">Текущий</div>
  </div>
  <div class="info-item">
    <div class="info-val" id="info-next">×1.00</div>
    <div class="info-lbl">Следующий</div>
  </div>
  <div class="info-item">
    <div class="info-val" id="info-payout">0</div>
    <div class="info-lbl">Выигрыш 🪙</div>
  </div>
</div>

<!-- Кнопки -->
<div class="btn-row">
  <button class="btn btn-start" id="btn-start" onclick="startGame()">
    🚀 Начать игру
  </button>
  <button class="btn btn-cashout" id="btn-cashout" onclick="cashout()" style="display:none">
    💰 Забрать
  </button>
</div>

<!-- Результат -->
<div class="result-overlay" id="result-overlay">
  <div class="result-card">
    <div class="result-icon" id="res-icon"></div>
    <div class="result-title" id="res-title"></div>
    <div class="result-amt" id="res-amt"></div>
    <div class="result-mult" id="res-mult"></div>
    <button class="btn-again" onclick="resetGame()">↺ Сыграть ещё</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const API = "https://bot-1782901267-5094-bringnice.bothost.tech";
const CELLS = 25;

let state = {
  playing: false, gameId: null, bet: 500, mineCount: 3,
  gemsFound: 0, revealed: [], mult: 1.0, nextMult: 1.0, balance: 0,
};

document.addEventListener("DOMContentLoaded", async () => {
  buildMineOpts();
  buildGrid();
  await loadBalance();
  await checkActiveGame();
});

function buildMineOpts() {
  const row = document.getElementById("mines-opts");
  [1, 2, 3, 5, 10, 15, 24].forEach(n => {
    const btn = document.createElement("button");
    btn.className = "chip" + (n === state.mineCount ? " active" : "");
    btn.innerHTML = `${n} 💣`;
    btn.onclick = () => {
      document.querySelectorAll(".chip").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      state.mineCount = n;
    };
    row.appendChild(btn);
  });
}

function buildGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  for (let i = 0; i < CELLS; i++) {
    const cell = document.createElement("div");
    cell.className = "cell hidden";
    cell.id = `cell-${i}`;
    cell.textContent = "?";
    cell.onclick = () => clickCell(i);
    grid.appendChild(cell);
  }
}

async function loadBalance() {
  try {
    const r = await api("GET", "/api/balance");
    if (r.ok) { state.balance = r.balance; document.getElementById("balance-val").textContent = fmt(r.balance); }
  } catch(e) {}
}

async function checkActiveGame() {
  try {
    const r = await api("GET", "/api/mines/state");
    if (r.ok && r.active) {
      state.playing = true; state.gameId = r.game_id; state.bet = r.bet;
      state.mineCount = r.mine_count; state.gemsFound = r.gems_found;
      state.revealed = r.revealed; state.mult = r.mult; state.nextMult = r.next_mult;
      enterPlayMode();
      r.revealed.forEach(idx => setCell(idx, "gem"));
      updateInfo();
    }
  } catch(e) {}
}

async function api(method, path, body) {
  const opts = { method, headers: { "Content-Type": "application/json", "X-Init-Data": tg.initData } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  return res.json();
}

async function startGame() {
  const bet = parseFloat(document.getElementById("bet-input").value);
  if (!bet || bet < 100) { showToast("Минимальная ставка 100 Ucoin"); return; }
  if (bet > state.balance) { showToast("Недостаточно средств"); return; }
  document.getElementById("btn-start").disabled = true;
  try {
    const r = await api("POST", "/api/mines/start", { bet, mine_count: state.mineCount });
    if (!r.ok) { showToast(r.error); document.getElementById("btn-start").disabled = false; return; }
    state.playing = true; state.gameId = r.game_id; state.bet = r.bet;
    state.mineCount = r.mine_count; state.gemsFound = 0; state.revealed = [];
    state.mult = 1.0; state.nextMult = r.next_mult;
    state.balance -= bet;
    document.getElementById("balance-val").textContent = fmt(state.balance);
    buildGrid(); enterPlayMode(); updateInfo();
    tg.HapticFeedback.impactOccurred("medium");
  } catch(e) { showToast("Ошибка соединения"); document.getElementById("btn-start").disabled = false; }
}

async function clickCell(idx) {
  if (!state.playing) return;
  if (state.revealed.includes(idx)) return;
  setGridDisabled(true);
  try {
    const r = await api("POST", "/api/mines/click", { game_id: state.gameId, cell: idx });
    if (!r.ok) { showToast(r.error); setGridDisabled(false); return; }
    if (r.result === "lose") {
      setCell(idx, "exploded");
      r.mines.forEach(m => { if (m !== idx) setCell(m, "mine"); });
      state.playing = false;
      tg.HapticFeedback.notificationOccurred("error");
      await sleep(700);
      showResult(false, state.bet, r.mult);
      exitPlayMode();
    } else if (r.result === "win_all") {
      setCell(idx, "gem");
      state.gemsFound = r.gems_found; state.mult = r.mult;
      state.balance = r.new_balance;
      document.getElementById("balance-val").textContent = fmt(state.balance);
      state.playing = false; updateInfo();
      tg.HapticFeedback.notificationOccurred("success");
      await sleep(400);
      showResult(true, r.payout - state.bet, r.mult);
      exitPlayMode();
    } else {
      setCell(idx, "gem");
      state.revealed.push(idx); state.gemsFound = r.gems_found;
      state.mult = r.mult; state.nextMult = r.next_mult;
      updateInfo(); setGridDisabled(false);
      tg.HapticFeedback.impactOccurred("light");
    }
  } catch(e) { showToast("Ошибка соединения"); setGridDisabled(false); }
}

async function cashout() {
  if (!state.playing || state.gemsFound === 0) return;
  document.getElementById("btn-cashout").disabled = true;
  setGridDisabled(true);
  try {
    const r = await api("POST", "/api/mines/cashout", { game_id: state.gameId });
    if (!r.ok) { showToast(r.error); document.getElementById("btn-cashout").disabled = false; setGridDisabled(false); return; }
    r.mines.forEach(m => setCell(m, "mine"));
    state.balance = r.new_balance;
    document.getElementById("balance-val").textContent = fmt(state.balance);
    state.playing = false;
    tg.HapticFeedback.notificationOccurred("success");
    await sleep(400);
    showResult(true, r.payout - state.bet, r.mult);
    exitPlayMode();
  } catch(e) { showToast("Ошибка соединения"); document.getElementById("btn-cashout").disabled = false; setGridDisabled(false); }
}

function resetGame() {
  document.getElementById("result-overlay").classList.remove("show");
  buildGrid(); state.playing = false; state.gameId = null;
  state.gemsFound = 0; state.revealed = [];
  exitPlayMode(); loadBalance();
}

function enterPlayMode() {
  document.getElementById("settings-panel").style.display = "none";
  document.getElementById("info-row").style.display = "flex";
  document.getElementById("btn-start").style.display = "none";
  document.getElementById("btn-cashout").style.display = "block";
  document.getElementById("btn-cashout").disabled = true;
}

function exitPlayMode() {
  document.getElementById("settings-panel").style.display = "block";
  document.getElementById("info-row").style.display = "none";
  document.getElementById("btn-start").style.display = "block";
  document.getElementById("btn-start").disabled = false;
  document.getElementById("btn-cashout").style.display = "none";
}

function updateInfo() {
  const payout = Math.round(state.bet * state.mult);
  document.getElementById("info-mult").textContent = `×${state.mult.toFixed(2)}`;
  document.getElementById("info-next").textContent = `×${state.nextMult.toFixed(2)}`;
  document.getElementById("info-payout").textContent = fmt(payout);
  if (state.gemsFound > 0) {
    const cb = document.getElementById("btn-cashout");
    cb.disabled = false;
    cb.innerHTML = `💰 Забрать (${fmt(payout)})`;
  }
}

function setCell(idx, type) {
  const cell = document.getElementById(`cell-${idx}`);
  if (!cell) return;
  cell.classList.remove("hidden", "gem", "mine", "exploded");
  cell.classList.add(type, "disabled");
  if (type === "gem")      cell.textContent = "💎";
  else if (type === "mine") cell.textContent = "💣";
  else if (type === "exploded") cell.textContent = "💥";
}

function setGridDisabled(val) {
  document.querySelectorAll(".cell.hidden").forEach(c => { c.style.pointerEvents = val ? "none" : ""; });
}

function showResult(win, profit, mult) {
  document.getElementById("res-icon").textContent = win ? "💎" : "💥";
  const title = document.getElementById("res-title");
  title.textContent = win ? "Победа!" : "Взрыв!";
  title.className = "result-title " + (win ? "win" : "lose");
  const amt = document.getElementById("res-amt");
  const p = Math.abs(Math.round(profit));
  amt.textContent = (win ? "+" : "-") + fmt(p) + " 🪙";
  amt.className = "result-amt " + (win ? "win" : "lose");
  document.getElementById("res-mult").textContent = win ? `множитель ×${mult.toFixed(2)}` : "Удачи в следующий раз!";
  document.getElementById("result-overlay").classList.add("show");
}

function multBet(f) { const i = document.getElementById("bet-input"); i.value = Math.max(100, Math.round(parseFloat(i.value||500)*f)); }
function setBetAll() { document.getElementById("bet-input").value = Math.floor(state.balance); }
function fmt(n) { return Math.round(n).toLocaleString("ru-RU"); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}
</script>
</body>
</html>
