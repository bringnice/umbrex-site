!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💣 Мины — Umbrex</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f1a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    overflow-x: hidden;
  }

  .header {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .title { font-size: 22px; font-weight: 700; }
  .balance {
    background: #1e1e2e;
    border-radius: 12px;
    padding: 8px 14px;
    font-size: 14px;
    color: #a0a0c0;
  }
  .balance span { color: #f0c060; font-weight: 700; }

  /* Настройки */
  .settings {
    width: 100%;
    background: #1e1e2e;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .setting-label { font-size: 13px; color: #a0a0c0; white-space: nowrap; }

  .bet-controls {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .bet-btn {
    background: #2a2a3e;
    border: none;
    color: #fff;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .bet-btn:active { background: #3a3a5e; }

  #bet-input {
    background: #12121e;
    border: 1px solid #2a2a3e;
    border-radius: 8px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    width: 110px;
    padding: 6px 10px;
    text-align: center;
    outline: none;
  }

  .mines-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .mine-opt {
    background: #2a2a3e;
    border: 2px solid transparent;
    color: #a0a0c0;
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .mine-opt.active {
    border-color: #e05050;
    color: #fff;
    background: #3a1a1a;
  }

  /* Поле */
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    width: 100%;
    max-width: 380px;
    margin-bottom: 16px;
  }

  .cell {
    aspect-ratio: 1;
    border-radius: 10px;
    background: #1e1e2e;
    border: 2px solid #2a2a3e;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s, border-color 0.2s;
    user-select: none;
    -webkit-user-select: none;
  }

  .cell:active { transform: scale(0.92); }

  .cell.hidden { background: #1e1e2e; }
  .cell.hidden:hover { border-color: #4a4a6e; background: #252538; }

  .cell.gem {
    background: #0d2a1a;
    border-color: #1a8a4a;
    animation: pop 0.25s ease;
  }

  .cell.mine {
    background: #2a0d0d;
    border-color: #8a1a1a;
  }

  .cell.exploded {
    background: #5a1010;
    border-color: #ff4444;
    animation: shake 0.3s ease;
  }

  .cell.disabled { cursor: default; pointer-events: none; }

  @keyframes pop {
    0% { transform: scale(0.8); }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  /* Инфо */
  .info-row {
    width: 100%;
    max-width: 380px;
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .info-card {
    flex: 1;
    background: #1e1e2e;
    border-radius: 12px;
    padding: 10px;
    text-align: center;
  }

  .info-card .val {
    font-size: 18px;
    font-weight: 700;
    color: #f0c060;
  }

  .info-card .lbl {
    font-size: 11px;
    color: #606080;
    margin-top: 2px;
  }

  /* Кнопки */
  .btn-row {
    width: 100%;
    max-width: 380px;
    display: flex;
    gap: 8px;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: default; }

  .btn-start { background: linear-gradient(135deg, #e05050, #a02020); color: #fff; }
  .btn-cashout { background: linear-gradient(135deg, #40c060, #207040); color: #fff; }

  /* Результат */
  .result-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .result-overlay.show { opacity: 1; pointer-events: all; }

  .result-card {
    background: #1e1e2e;
    border-radius: 20px;
    padding: 32px 28px;
    text-align: center;
    max-width: 280px;
    transform: scale(0.85);
    transition: transform 0.25s;
  }
  .result-overlay.show .result-card { transform: scale(1); }

  .result-emoji { font-size: 52px; margin-bottom: 12px; }
  .result-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .result-sub { font-size: 15px; color: #a0a0c0; margin-bottom: 20px; }
  .result-sub span { color: #f0c060; font-weight: 700; }

  .btn-again {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #5060e0, #3040a0);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2a2a3e;
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="title">💣 Мины</div>
  <div class="balance">Баланс: <span id="balance-val">—</span> 🪙</div>
</div>

<!-- Настройки (только до старта) -->
<div class="settings" id="settings-panel">
  <div class="setting-row">
    <span class="setting-label">Ставка (Ucoin)</span>
    <div class="bet-controls">
      <button class="bet-btn" onclick="multBet(0.5)">½</button>
      <button class="bet-btn" onclick="multBet(2)">×2</button>
      <input id="bet-input" type="number" value="500" min="100" step="100">
      <button class="bet-btn" onclick="setBetAll()">Всё</button>
    </div>
  </div>
  <div class="setting-row">
    <span class="setting-label">Мины</span>
    <div class="mines-row" id="mines-opts"></div>
  </div>
</div>

<!-- Поле -->
<div class="grid" id="grid"></div>

<!-- Инфо во время игры -->
<div class="info-row" id="info-row" style="display:none">
  <div class="info-card">
    <div class="val" id="info-mult">×1.00</div>
    <div class="lbl">Текущий</div>
  </div>
  <div class="info-card">
    <div class="val" id="info-next">×1.00</div>
    <div class="lbl">Следующий</div>
  </div>
  <div class="info-card">
    <div class="val" id="info-payout">0</div>
    <div class="lbl">Выигрыш 🪙</div>
  </div>
</div>

<!-- Кнопки -->
<div class="btn-row">
  <button class="btn btn-start" id="btn-start" onclick="startGame()">🎮 Начать</button>
  <button class="btn btn-cashout" id="btn-cashout" onclick="cashout()" style="display:none">💰 Забрать</button>
</div>

<!-- Результат -->
<div class="result-overlay" id="result-overlay">
  <div class="result-card">
    <div class="result-emoji" id="res-emoji"></div>
    <div class="result-title" id="res-title"></div>
    <div class="result-sub" id="res-sub"></div>
    <button class="btn-again" onclick="resetGame()">🔄 Сыграть ещё</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// ── Конфиг ──
const API = "https://bot-1782901267-5094-bringnice.bothost.tech"; // URL бота на bothost
const CELLS = 25;

let state = {
  playing: false,
  gameId: null,
  bet: 500,
  mineCount: 3,
  gemsFound: 0,
  revealed: [],
  mult: 1.0,
  nextMult: 1.0,
  balance: 0,
};

// ── Init ──
document.addEventListener("DOMContentLoaded", async () => {
  buildMineOpts();
  buildGrid();
  await loadBalance();
  await checkActiveGame();
});

function buildMineOpts() {
  const row = document.getElementById("mines-opts");
  [1, 2, 3, 5, 10, 15, 24].forEach(n => {
    const btn = document.createElement("button");
    btn.className = "mine-opt" + (n === state.mineCount ? " active" : "");
    btn.textContent = `${n}💣`;
    btn.onclick = () => {
      document.querySelectorAll(".mine-opt").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      state.mineCount = n;
    };
    row.appendChild(btn);
  });
}

function buildGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  for (let i = 0; i < CELLS; i++) {
    const cell = document.createElement("div");
    cell.className = "cell hidden";
    cell.id = `cell-${i}`;
    cell.textContent = "❓";
    cell.onclick = () => clickCell(i);
    grid.appendChild(cell);
  }
}

async function loadBalance() {
  try {
    const r = await api("GET", "/api/balance");
    if (r.ok) {
      state.balance = r.balance;
      document.getElementById("balance-val").textContent = fmt(r.balance);
    }
  } catch(e) {}
}

async function checkActiveGame() {
  try {
    const r = await api("GET", "/api/mines/state");
    if (r.ok && r.active) {
      // Восстанавливаем активную игру
      state.playing = true;
      state.gameId = r.game_id;
      state.bet = r.bet;
      state.mineCount = r.mine_count;
      state.gemsFound = r.gems_found;
      state.revealed = r.revealed;
      state.mult = r.mult;
      state.nextMult = r.next_mult;
      enterPlayMode();
      r.revealed.forEach(idx => setCell(idx, "gem"));
      updateInfo();
    }
  } catch(e) {}
}

// ── API ──
async function api(method, path, body) {
  const opts = {
    method,
    headers: {
      "Content-Type": "application/json",
      "X-Init-Data": tg.initData,
    },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  return res.json();
}

// ── Игра ──
async function startGame() {
  const bet = parseFloat(document.getElementById("bet-input").value);
  if (!bet || bet < 100) { showToast("Минимальная ставка 100 Ucoin"); return; }
  if (bet > state.balance) { showToast("Недостаточно средств"); return; }

  document.getElementById("btn-start").disabled = true;

  try {
    const r = await api("POST", "/api/mines/start", { bet, mine_count: state.mineCount });
    if (!r.ok) { showToast(r.error); document.getElementById("btn-start").disabled = false; return; }

    state.playing = true;
    state.gameId = r.game_id;
    state.bet = r.bet;
    state.mineCount = r.mine_count;
    state.gemsFound = 0;
    state.revealed = [];
    state.mult = 1.0;
    state.nextMult = r.next_mult;
    state.balance -= bet;
    document.getElementById("balance-val").textContent = fmt(state.balance);

    buildGrid();
    enterPlayMode();
    updateInfo();
  } catch(e) {
    showToast("Ошибка соединения");
    document.getElementById("btn-start").disabled = false;
  }
}

async function clickCell(idx) {
  if (!state.playing) return;
  if (state.revealed.includes(idx)) return;

  // Блокируем всё поле на время запроса
  setGridDisabled(true);

  try {
    const r = await api("POST", "/api/mines/click", { game_id: state.gameId, cell: idx });
    if (!r.ok) { showToast(r.error); setGridDisabled(false); return; }

    if (r.result === "lose") {
      setCell(idx, "exploded");
      r.mines.forEach(m => { if (m !== idx) setCell(m, "mine"); });
      state.playing = false;
      await sleep(600);
      showResult(false, state.bet, r.mult);
      exitPlayMode();
    } else if (r.result === "win_all") {
      setCell(idx, "gem");
      state.gemsFound = r.gems_found;
      state.mult = r.mult;
      state.balance = r.new_balance;
      document.getElementById("balance-val").textContent = fmt(state.balance);
      state.playing = false;
      updateInfo();
      await sleep(400);
      showResult(true, r.payout - state.bet, r.mult);
      exitPlayMode();
    } else {
      // gem
      setCell(idx, "gem");
      state.revealed.push(idx);
      state.gemsFound = r.gems_found;
      state.mult = r.mult;
      state.nextMult = r.next_mult;
      updateInfo();
      setGridDisabled(false);
    }
  } catch(e) {
    showToast("Ошибка соединения");
    setGridDisabled(false);
  }
}

async function cashout() {
  if (!state.playing || state.gemsFound === 0) return;
  document.getElementById("btn-cashout").disabled = true;
  setGridDisabled(true);

  try {
    const r = await api("POST", "/api/mines/cashout", { game_id: state.gameId });
    if (!r.ok) { showToast(r.error); document.getElementById("btn-cashout").disabled = false; setGridDisabled(false); return; }

    r.mines.forEach(m => setCell(m, "mine"));
    state.balance = r.new_balance;
    document.getElementById("balance-val").textContent = fmt(state.balance);
    state.playing = false;
    await sleep(400);
    showResult(true, r.payout - state.bet, r.mult);
    exitPlayMode();
  } catch(e) {
    showToast("Ошибка соединения");
    document.getElementById("btn-cashout").disabled = false;
    setGridDisabled(false);
  }
}

function resetGame() {
  document.getElementById("result-overlay").classList.remove("show");
  buildGrid();
  state.playing = false;
  state.gameId = null;
  state.gemsFound = 0;
  state.revealed = [];
  exitPlayMode();
  loadBalance();
}

// ── UI хелперы ──
function enterPlayMode() {
  document.getElementById("settings-panel").style.display = "none";
  document.getElementById("info-row").style.display = "flex";
  document.getElementById("btn-start").style.display = "none";
  document.getElementById("btn-cashout").style.display = "block";
  document.getElementById("btn-cashout").disabled = true; // включится после первого алмаза
}

function exitPlayMode() {
  document.getElementById("settings-panel").style.display = "flex";
  document.getElementById("info-row").style.display = "none";
  document.getElementById("btn-start").style.display = "block";
  document.getElementById("btn-start").disabled = false;
  document.getElementById("btn-cashout").style.display = "none";
}

function updateInfo() {
  const payout = Math.round(state.bet * state.mult);
  document.getElementById("info-mult").textContent = `×${state.mult.toFixed(2)}`;
  document.getElementById("info-next").textContent = `×${state.nextMult.toFixed(2)}`;
  document.getElementById("info-payout").textContent = fmt(payout);
  const co = document.getElementById("btn-cashout");
  if (state.gemsFound > 0) co.disabled = false;
}

function setCell(idx, type) {
  const cell = document.getElementById(`cell-${idx}`);
  if (!cell) return;
  cell.classList.remove("hidden", "gem", "mine", "exploded");
  cell.classList.add(type, "disabled");
  if (type === "gem") cell.textContent = "💎";
  else if (type === "mine") cell.textContent = "💣";
  else if (type === "exploded") cell.textContent = "💥";
}

function setGridDisabled(val) {
  document.querySelectorAll(".cell.hidden").forEach(c => {
    if (val) c.style.pointerEvents = "none";
    else c.style.pointerEvents = "";
  });
}

function showResult(win, profit, mult) {
  document.getElementById("res-emoji").textContent = win ? "🎉" : "💥";
  document.getElementById("res-title").textContent = win ? "Победа!" : "Взрыв!";
  const profitFmt = fmt(Math.abs(Math.round(profit)));
  document.getElementById("res-sub").innerHTML = win
    ? `+<span>${profitFmt}</span> Ucoin (×${mult.toFixed(2)})`
    : `-<span>${profitFmt}</span> Ucoin`;
  document.getElementById("result-overlay").classList.add("show");
  tg.HapticFeedback.notificationOccurred(win ? "success" : "error");
}

function multBet(factor) {
  const inp = document.getElementById("bet-input");
  inp.value = Math.max(100, Math.round(parseFloat(inp.value || 500) * factor));
}

function setBetAll() {
  document.getElementById("bet-input").value = Math.floor(state.balance);
}

function fmt(n) {
  return Math.round(n).toLocaleString("ru-RU");
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}
</script>
</body>
</html>
