<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Мины — Umbrex</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0d0b18;
  --card: #131120;
  --card2: #1a1730;
  --border: #2d2850;
  --purple: #8b5cf6;
  --purple-light: #a78bfa;
  --purple-dark: #5b21b6;
  --purple-glow: rgba(139,92,246,0.4);
  --green: #34d399;
  --green-glow: rgba(52,211,153,0.3);
  --red: #f87171;
  --red-glow: rgba(248,113,113,0.3);
  --text: #f0eeff;
  --muted: #6d6a8a;
  --muted2: #3a3760;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -200px; left: -100px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(139,92,246,0.07) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

/* ── Хедер ── */
.header {
  position: relative;
  z-index: 10;
  padding: 14px 16px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.header-title { text-align: center; }
.header-title h1 { font-size: 17px; font-weight: 800; }
.header-title p { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 1px; }

.balance-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 8px 14px;
  text-align: right;
}
.balance-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
.balance-amount {
  font-size: 17px;
  font-weight: 800;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 1px;
  justify-content: flex-end;
}

/* пустышка слева для симметрии */
.header-left {
  width: 90px;
}

/* ── Поле ── */
.grid-wrap {
  position: relative;
  z-index: 10;
  flex: 1;
  margin: 0 12px 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 7px;
  width: 100%;
}

.cell {
  aspect-ratio: 1;
  border-radius: 12px;
  background: var(--card2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.12s, background 0.2s, border-color 0.2s, box-shadow 0.2s;
  user-select: none;
  -webkit-user-select: none;
  position: relative;
  overflow: hidden;
}

.cell::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 45%;
  background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
  border-radius: 12px 12px 0 0;
  pointer-events: none;
}

.cell-inner { width: 55%; height: 55%; position: relative; z-index: 1; }

.cell.hidden .cell-q {
  font-size: 18px;
  font-weight: 800;
  color: var(--muted2);
  line-height: 1;
}

.cell.hidden:active { transform: scale(0.88); background: #1e1a38; }

.cell.gem {
  background: linear-gradient(145deg, #0a2e22, #0d3828);
  border-color: var(--green);
  box-shadow: 0 0 16px var(--green-glow), inset 0 0 12px rgba(52,211,153,0.06);
  animation: popIn 0.3s cubic-bezier(.36,.07,.19,.97);
}

.cell.mine {
  background: linear-gradient(145deg, #1a0f38, #221545);
  border-color: var(--purple);
  box-shadow: 0 0 14px var(--purple-glow);
}

.cell.exploded {
  background: linear-gradient(145deg, #2e0f0f, #3d1212);
  border-color: var(--red);
  box-shadow: 0 0 22px var(--red-glow);
  animation: boom 0.4s ease;
}

.cell.disabled { cursor: default; pointer-events: none; }

@keyframes popIn {
  0%   { transform: scale(0.7); opacity: 0.4; }
  65%  { transform: scale(1.12); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes boom {
  0%   { transform: scale(1.18) rotate(-5deg); }
  30%  { transform: scale(0.87) rotate(4deg); }
  65%  { transform: scale(1.05) rotate(-2deg); }
  100% { transform: scale(1) rotate(0); }
}

/* ── Инфо ── */
.info-row {
  position: relative;
  z-index: 10;
  margin: 0 12px 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 10px 16px;
  display: flex;
  flex-shrink: 0;
}

.info-item { flex: 1; text-align: center; position: relative; }
.info-item + .info-item::before {
  content: '';
  position: absolute;
  left: 0; top: 15%; bottom: 15%;
  width: 1px;
  background: var(--border);
}

.info-val {
  font-size: 18px;
  font-weight: 800;
  color: var(--purple-light);
  text-shadow: 0 0 10px var(--purple-glow);
}
.info-lbl { font-size: 9px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.7px; }

/* ── Настройки (снизу) ── */
.settings {
  position: relative;
  z-index: 10;
  margin: 0 12px 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 10px 12px;
  flex-shrink: 0;
}

.setting-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.setting-row:last-child { margin-bottom: 0; }

.setting-label {
  font-size: 10px;
  color: var(--muted);
  min-width: 42px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}

.chips { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; }

.chip {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 5px 9px;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 3px;
}
.chip.active {
  background: rgba(139,92,246,0.18);
  border-color: var(--purple);
  color: var(--purple-light);
  box-shadow: 0 0 10px var(--purple-glow);
}
.chip:active { transform: scale(0.9); }

.bet-input-wrap { display: flex; align-items: center; gap: 4px; flex: 1; }

#bet-input {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 9px;
  color: var(--text);
  font-size: 14px;
  font-weight: 700;
  flex: 1;
  width: 0;
  padding: 5px 8px;
  text-align: center;
  outline: none;
  transition: border-color 0.15s;
}
#bet-input:focus { border-color: var(--purple); }

.bet-mod {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
  padding: 5px 8px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.12s;
}
.bet-mod:active { border-color: var(--purple); color: var(--purple-light); }

/* ── Кнопки ── */
.btn-row {
  position: relative;
  z-index: 10;
  padding: 0 12px 14px;
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.btn {
  flex: 1;
  padding: 15px;
  border: none;
  border-radius: 16px;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
}
.btn:active { transform: scale(0.95); }
.btn:disabled { opacity: 0.35; cursor: default; }

.btn-start {
  background: linear-gradient(135deg, #7c3aed, #5b21b6);
  color: #fff;
  box-shadow: 0 6px 24px rgba(124,58,237,0.45);
}

.btn-cashout {
  background: linear-gradient(135deg, #059669, #047857);
  color: #fff;
  box-shadow: 0 6px 24px rgba(5,150,105,0.35);
}

/* ── Результат ── */
.result-overlay {
  position: fixed;
  inset: 0;
  background: rgba(13,11,24,0.9);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.result-overlay.show { opacity: 1; pointer-events: all; }

.result-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 36px 28px 28px;
  text-align: center;
  width: 88%;
  max-width: 320px;
  transform: scale(0.8) translateY(30px);
  transition: transform 0.32s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 0 80px rgba(139,92,246,0.2);
}
.result-overlay.show .result-card { transform: scale(1) translateY(0); }

.result-icon { font-size: 60px; line-height: 1; margin-bottom: 14px; }
.result-title { font-size: 26px; font-weight: 900; margin-bottom: 6px; }
.result-title.win { color: var(--green); }
.result-title.lose { color: var(--red); }
.result-amt { font-size: 30px; font-weight: 900; margin-bottom: 4px; }
.result-amt.win { color: var(--purple-light); text-shadow: 0 0 20px var(--purple-glow); }
.result-amt.lose { color: var(--red); }
.result-mult { font-size: 13px; color: var(--muted); margin-bottom: 22px; }

.btn-again {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #7c3aed, #5b21b6);
  color: #fff;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(124,58,237,0.4);
  transition: transform 0.1s;
}
.btn-again:active { transform: scale(0.96); }

.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 24px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  transition: all 0.28s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 200;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Хедер -->
<div class="header">
  <div class="header-left"></div>
  <div class="header-title">
    <h1>Umbrex</h1>
    <p>Мини-игра</p>
  </div>
  <div class="balance-card">
    <div class="balance-label">Баланс</div>
    <div class="balance-amount">
      <span id="balance-val">—</span> 🪙
    </div>
  </div>
</div>

<!-- Поле -->
<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<!-- Инфо (во время игры) -->
<div class="info-row" id="info-row" style="display:none">
  <div class="info-item">
    <div class="info-val" id="info-mult">×1.00</div>
    <div class="info-lbl">Текущий</div>
  </div>
  <div class="info-item">
    <div class="info-val" id="info-next">×1.00</div>
    <div class="info-lbl">Следующий</div>
  </div>
  <div class="info-item">
    <div class="info-val" id="info-payout">0</div>
    <div class="info-lbl">Выигрыш 🪙</div>
  </div>
</div>

<!-- Настройки (снизу) -->
<div class="settings" id="settings-panel">
  <div class="setting-row">
    <span class="setting-label">Ставка</span>
    <div class="bet-input-wrap">
      <button class="bet-mod" onclick="multBet(0.5)">½</button>
      <button class="bet-mod" onclick="multBet(2)">×2</button>
      <input id="bet-input" type="number" value="500" min="100" step="100">
      <button class="bet-mod" onclick="setBetAll()">MAX</button>
    </div>
  </div>
  <div class="setting-row">
    <span class="setting-label">Мины</span>
    <div class="chips" id="mines-opts"></div>
  </div>
</div>

<!-- Кнопки -->
<div class="btn-row">
  <button class="btn btn-start" id="btn-start" onclick="startGame()">🚀 Начать</button>
  <button class="btn btn-cashout" id="btn-cashout" onclick="cashout()" style="display:none">💰 Забрать</button>
</div>

<!-- Результат -->
<div class="result-overlay" id="result-overlay">
  <div class="result-card">
    <div class="result-icon" id="res-icon"></div>
    <div class="result-title" id="res-title"></div>
    <div class="result-amt" id="res-amt"></div>
    <div class="result-mult" id="res-mult"></div>
    <button class="btn-again" onclick="resetGame()">↺ Сыграть ещё</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const API = "https://bot-1782901267-5094-bringnice.bothost.tech";
const CELLS = 25;

let state = {
  playing: false, gameId: null, bet: 500, mineCount: 3,
  gemsFound: 0, revealed: [], mult: 1.0, nextMult: 1.0, balance: 0,
};

document.addEventListener("DOMContentLoaded", async () => {
  buildMineOpts();
  buildGrid();
  await loadBalance();
  await checkActiveGame();
});

function svgUse(id) {
  return `<svg class="cell-inner" viewBox="0 0 40 40"><use href="#${id}"/></svg>`;
}

function buildMineOpts() {
  const row = document.getElementById("mines-opts");
  [1, 2, 3, 5, 10, 15, 24].forEach(n => {
    const btn = document.createElement("button");
    btn.className = "chip" + (n === state.mineCount ? " active" : "");
    btn.innerHTML = `${n} <svg width="11" height="11" viewBox="0 0 40 40"><use href="#ico-mine"/></svg>`;
    btn.onclick = () => {
      document.querySelectorAll(".chip").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      state.mineCount = n;
    };
    row.appendChild(btn);
  });
}

function buildGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  for (let i = 0; i < CELLS; i++) {
    const cell = document.createElement("div");
    cell.className = "cell hidden";
    cell.id = `cell-${i}`;
    cell.innerHTML = `<span class="cell-q">?</span>`;
    cell.onclick = () => clickCell(i);
    grid.appendChild(cell);
  }
}

async function loadBalance() {
  try {
    const r = await api("GET", "/api/balance");
    if (r.ok) { state.balance = r.balance; document.getElementById("balance-val").textContent = fmt(r.balance); }
  } catch(e) {}
}

async function checkActiveGame() {
  try {
    const r = await api("GET", "/api/mines/state");
    if (r.ok && r.active) {
      state.playing = true; state.gameId = r.game_id; state.bet = r.bet;
      state.mineCount = r.mine_count; state.gemsFound = r.gems_found;
      state.revealed = r.revealed; state.mult = r.mult; state.nextMult = r.next_mult;
      enterPlayMode();
      r.revealed.forEach(idx => setCell(idx, "gem"));
      updateInfo();
    }
  } catch(e) {}
}

async function api(method, path, body) {
  const opts = { method, headers: { "Content-Type": "application/json", "X-Init-Data": tg.initData } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  return res.json();
}

async function startGame() {
  const bet = parseFloat(document.getElementById("bet-input").value);
  if (!bet || bet < 100) { showToast("Минимальная ставка 100 Ucoin"); return; }
  if (bet > state.balance) { showToast("Недостаточно средств"); return; }
  document.getElementById("btn-start").disabled = true;
  try {
    const r = await api("POST", "/api/mines/start", { bet, mine_count: state.mineCount });
    if (!r.ok) { showToast(r.error); document.getElementById("btn-start").disabled = false; return; }
    state.playing = true; state.gameId = r.game_id; state.bet = r.bet;
    state.mineCount = r.mine_count; state.gemsFound = 0; state.revealed = [];
    state.mult = 1.0; state.nextMult = r.next_mult;
    state.balance -= bet;
    document.getElementById("balance-val").textContent = fmt(state.balance);
    buildGrid(); enterPlayMode(); updateInfo();
    tg.HapticFeedback.impactOccurred("medium");
  } catch(e) { showToast("Ошибка соединения"); document.getElementById("btn-start").disabled = false; }
}

async function clickCell(idx) {
  if (!state.playing) return;
  if (state.revealed.includes(idx)) return;
  setGridDisabled(true);
  try {
    const r = await api("POST", "/api/mines/click", { game_id: state.gameId, cell: idx });
    if (!r.ok) { showToast(r.error); setGridDisabled(false); return; }
    if (r.result === "lose") {
      setCell(idx, "exploded");
      r.mines.forEach(m => { if (m !== idx) setCell(m, "mine"); });
      state.playing = false;
      tg.HapticFeedback.notificationOccurred("error");
      await sleep(700);
      showResult(false, state.bet, r.mult);
      exitPlayMode();
    } else if (r.result === "win_all") {
      setCell(idx, "gem");
      state.gemsFound = r.gems_found; state.mult = r.mult;
      state.balance = r.new_balance;
      document.getElementById("balance-val").textContent = fmt(state.balance);
      state.playing = false; updateInfo();
      tg.HapticFeedback.notificationOccurred("success");
      await sleep(400);
      showResult(true, r.payout - state.bet, r.mult);
      exitPlayMode();
    } else {
      setCell(idx, "gem");
      state.revealed.push(idx); state.gemsFound = r.gems_found;
      state.mult = r.mult; state.nextMult = r.next_mult;
      updateInfo(); setGridDisabled(false);
      tg.HapticFeedback.impactOccurred("light");
    }
  } catch(e) { showToast("Ошибка соединения"); setGridDisabled(false); }
}

async function cashout() {
  if (!state.playing || state.gemsFound === 0) return;
  document.getElementById("btn-cashout").disabled = true;
  setGridDisabled(true);
  try {
    const r = await api("POST", "/api/mines/cashout", { game_id: state.gameId });
    if (!r.ok) { showToast(r.error); document.getElementById("btn-cashout").disabled = false; setGridDisabled(false); return; }
    r.mines.forEach(m => setCell(m, "mine"));
    state.balance = r.new_balance;
    document.getElementById("balance-val").textContent = fmt(state.balance);
    state.playing = false;
    tg.HapticFeedback.notificationOccurred("success");
    await sleep(400);
    showResult(true, r.payout - state.bet, r.mult);
    exitPlayMode();
  } catch(e) { showToast("Ошибка соединения"); document.getElementById("btn-cashout").disabled = false; setGridDisabled(false); }
}

function resetGame() {
  document.getElementById("result-overlay").classList.remove("show");
  buildGrid(); state.playing = false; state.gameId = null;
  state.gemsFound = 0; state.revealed = [];
  exitPlayMode(); loadBalance();
}

function enterPlayMode() {
  document.getElementById("settings-panel").style.display = "none";
  document.getElementById("info-row").style.display = "flex";
  document.getElementById("btn-start").style.display = "none";
  document.getElementById("btn-cashout").style.display = "block";
  document.getElementById("btn-cashout").disabled = true;
}

function exitPlayMode() {
  document.getElementById("settings-panel").style.display = "block";
  document.getElementById("info-row").style.display = "none";
  document.getElementById("btn-start").style.display = "block";
  document.getElementById("btn-start").disabled = false;
  document.getElementById("btn-cashout").style.display = "none";
}

function updateInfo() {
  const payout = Math.round(state.bet * state.mult);
  document.getElementById("info-mult").textContent = `×${state.mult.toFixed(2)}`;
  document.getElementById("info-next").textContent = `×${state.nextMult.toFixed(2)}`;
  document.getElementById("info-payout").textContent = fmt(payout);
  if (state.gemsFound > 0) {
    const cb = document.getElementById("btn-cashout");
    cb.disabled = false;
    cb.innerHTML = `💰 Забрать (${fmt(payout)})`;
  }
}

function setCell(idx, type) {
  const cell = document.getElementById(`cell-${idx}`);
  if (!cell) return;
  cell.classList.remove("hidden", "gem", "mine", "exploded");
  cell.classList.add(type, "disabled");
  if (type === "gem")       cell.innerHTML = svgUse("ico-gem");
  else if (type === "mine") cell.innerHTML = svgUse("ico-mine");
  else if (type === "exploded") cell.innerHTML = svgUse("ico-boom");
}

function setGridDisabled(val) {
  document.querySelectorAll(".cell.hidden").forEach(c => { c.style.pointerEvents = val ? "none" : ""; });
}

function showResult(win, profit, mult) {
  document.getElementById("res-icon").textContent = win ? "💎" : "💥";
  const title = document.getElementById("res-title");
  title.textContent = win ? "Победа!" : "Взрыв!";
  title.className = "result-title " + (win ? "win" : "lose");
  const amt = document.getElementById("res-amt");
  amt.textContent = (win ? "+" : "-") + fmt(Math.abs(Math.round(profit))) + " 🪙";
  amt.className = "result-amt " + (win ? "win" : "lose");
  document.getElementById("res-mult").textContent = win ? `множитель ×${mult.toFixed(2)}` : "Удачи в следующий раз!";
  document.getElementById("result-overlay").classList.add("show");
}

function multBet(f) { const i = document.getElementById("bet-input"); i.value = Math.max(100, Math.round(parseFloat(i.value||500)*f)); }
function setBetAll() { document.getElementById("bet-input").value = Math.floor(state.balance); }
function fmt(n) { return Math.round(n).toLocaleString("ru-RU"); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}
</script>
</body>
</html>
