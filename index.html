<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Мины — Umbrex</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0d0b18;
  --card: #131120;
  --card2: #1a1730;
  --border: #2d2850;
  --purple: #8b5cf6;
  --purple-light: #a78bfa;
  --purple-dark: #5b21b6;
  --purple-glow: rgba(139,92,246,0.4);
  --green: #34d399;
  --green-glow: rgba(52,211,153,0.3);
  --red: #f87171;
  --red-glow: rgba(248,113,113,0.3);
  --text: #f0eeff;
  --muted: #6d6a8a;
  --muted2: #3a3760;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(80,30,140,0.55) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(60,20,120,0.45) 0%, transparent 55%),
    radial-gradient(ellipse 100% 100% at 50% 50%, #0a0818 40%, #130c2a 100%);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

.app {
  position: relative;
  width: 100%;
  max-width: 480px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding-bottom: 24px;
}

.app::before {
  content: '';
  position: absolute;
  top: -100px; left: -80px;
  width: 420px; height: 420px;
  background: radial-gradient(circle, rgba(139,92,246,0.18) 0%, rgba(100,50,200,0.08) 50%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
.app::after {
  content: '';
  position: absolute;
  bottom: 100px; right: -80px;
  width: 350px; height: 350px;
  background: radial-gradient(circle, rgba(90,30,180,0.15) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

/* ── Хедер ── */
.header {
  position: relative;
  z-index: 10;
  padding: 14px 16px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.header-title { text-align: center; }
.header-title h1 { font-size: 17px; font-weight: 800; }
.header-title p { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 1px; }

.balance-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 8px 14px;
  text-align: right;
}
.balance-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
.balance-amount {
  font-size: 17px;
  font-weight: 800;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 1px;
  justify-content: flex-end;
}

/* пустышка слева для симметрии */
.header-left {
  width: 90px;
}

/* ── Поле ── */
.grid-wrap {
  position: relative;
  z-index: 10;
  margin: 0 14px 16px;
  background: linear-gradient(145deg, rgba(18,14,38,0.95), rgba(14,10,30,0.98));
  border: 1px solid rgba(60,48,100,0.6);
  border-radius: 22px;
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow:
    0 0 60px rgba(80,30,180,0.12),
    inset 0 1px 0 rgba(255,255,255,0.04),
    inset 0 0 40px rgba(30,15,70,0.3);
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  width: 100%;
}

.cell {
  aspect-ratio: 1;
  border-radius: 14px;
  background: linear-gradient(145deg, #1c1635, #16112b);
  border: 1px solid rgba(55,42,100,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.12s, background 0.2s, border-color 0.2s, box-shadow 0.2s;
  user-select: none;
  -webkit-user-select: none;
  position: relative;
  overflow: hidden;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.06),
    inset 0 -1px 0 rgba(0,0,0,0.3),
    0 2px 8px rgba(0,0,0,0.4);
}

.cell::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,0.07) 0%, transparent 100%);
  border-radius: 14px 14px 0 0;
  pointer-events: none;
}

.cell-inner { width: 62%; height: 62%; position: relative; z-index: 1; }

.cell.hidden .cell-q {
  font-size: 18px;
  font-weight: 800;
  color: rgba(100,85,160,0.7);
  line-height: 1;
  text-shadow: 0 0 8px rgba(139,92,246,0.15);
}

.cell.hidden:active { transform: scale(0.88); background: #1e1a38; }

.cell.gem {
  background: linear-gradient(145deg, #0c3025, #0f3d2e);
  border: 2px solid var(--green);
  box-shadow:
    0 0 20px rgba(52,211,153,0.5),
    0 0 40px rgba(52,211,153,0.2),
    inset 0 0 16px rgba(52,211,153,0.08),
    inset 0 1px 0 rgba(52,211,153,0.2);
  animation: popIn 0.3s cubic-bezier(.36,.07,.19,.97);
}

.cell.mine {
  background: linear-gradient(145deg, #1a0f38, #221545);
  border-color: var(--purple);
  box-shadow: 0 0 14px var(--purple-glow);
}

.cell.exploded {
  background: linear-gradient(145deg, #2e0f0f, #3d1212);
  border-color: var(--red);
  box-shadow: 0 0 22px var(--red-glow);
  animation: boom 0.4s ease;
}

.cell.disabled { cursor: default; pointer-events: none; }

@keyframes popIn {
  0%   { transform: scale(0.7); opacity: 0.4; }
  65%  { transform: scale(1.12); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes boom {
  0%   { transform: scale(1.18) rotate(-5deg); }
  30%  { transform: scale(0.87) rotate(4deg); }
  65%  { transform: scale(1.05) rotate(-2deg); }
  100% { transform: scale(1) rotate(0); }
}

/* ── Инфо ── */
.info-row {
  position: relative;
  z-index: 10;
  margin: 0 14px 16px;
  background: linear-gradient(145deg, rgba(18,14,38,0.97), rgba(13,10,28,0.99));
  border: 1px solid rgba(55,42,100,0.6);
  border-radius: 16px;
  padding: 13px 16px;
  display: flex;
  flex-shrink: 0;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
}

.info-item { flex: 1; text-align: center; position: relative; }
.info-item + .info-item::before {
  content: '';
  position: absolute;
  left: 0; top: 15%; bottom: 15%;
  width: 1px;
  background: var(--border);
}

.info-val {
  font-size: 20px;
  font-weight: 900;
  color: var(--purple-light);
  text-shadow: 0 0 14px rgba(167,139,250,0.6), 0 0 30px rgba(139,92,246,0.3);
}
.info-item:last-child .info-val {
  color: #c084fc;
  text-shadow: 0 0 14px rgba(192,132,252,0.6);
}
.info-lbl { font-size: 9px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

/* ── Настройки (снизу) ── */
.settings {
  position: relative;
  z-index: 10;
  margin: 0 14px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px;
  flex-shrink: 0;
}

.setting-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.setting-row:last-child { margin-bottom: 0; }

.setting-label {
  font-size: 10px;
  color: var(--muted);
  min-width: 42px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}

.chips { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; }

.chip {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 5px 9px;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 3px;
}
.chip.active {
  background: rgba(139,92,246,0.18);
  border-color: var(--purple);
  color: var(--purple-light);
  box-shadow: 0 0 10px var(--purple-glow);
}
.chip:active { transform: scale(0.9); }

.bet-input-wrap { display: flex; align-items: center; gap: 4px; flex: 1; }

#bet-input {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 9px;
  color: var(--text);
  font-size: 14px;
  font-weight: 700;
  flex: 1;
  width: 0;
  padding: 5px 8px;
  text-align: center;
  outline: none;
  transition: border-color 0.15s;
}
#bet-input:focus { border-color: var(--purple); }

.bet-mod {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
  padding: 5px 8px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.12s;
}
.bet-mod:active { border-color: var(--purple); color: var(--purple-light); }

.mines-input {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 9px;
  color: var(--text);
  font-size: 13px;
  font-weight: 700;
  width: 46px;
  flex-shrink: 0;
  padding: 5px 4px;
  text-align: center;
  outline: none;
  transition: border-color 0.15s;
}
.mines-input:focus { border-color: var(--purple); }

/* ── Кнопки ── */
.btn-row {
  position: relative;
  z-index: 10;
  padding: 0 14px 6px;
  display: flex;
  gap: 10px;
  flex-shrink: 0;
}

.btn {
  flex: 1;
  padding: 15px;
  border: none;
  border-radius: 16px;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
}
.btn:active { transform: scale(0.95); }
.btn:disabled { opacity: 0.35; cursor: default; }

.btn-start {
  background: linear-gradient(135deg, #7c3aed, #5b21b6);
  color: #fff;
  box-shadow: 0 6px 24px rgba(124,58,237,0.45);
}

.btn-cashout {
  background: linear-gradient(135deg, #059669, #047857);
  color: #fff;
  box-shadow: 0 6px 24px rgba(5,150,105,0.35);
}

/* ── Результат (небольшой авто-исчезающий баннер, не блокирует экран) ── */
.result-toast {
  position: fixed;
  top: 16px;
  left: 50%;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 14px 20px;
  max-width: 86%;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 30px rgba(139,92,246,0.15);
  opacity: 0;
  pointer-events: none;
  transform: translateX(-50%) translateY(-16px);
  transition: opacity 0.3s, transform 0.3s cubic-bezier(.34,1.56,.64,1);
}
.result-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.result-icon { font-size: 34px; line-height: 1; flex-shrink: 0; }
.result-body { text-align: left; }
.result-title { font-size: 15px; font-weight: 900; margin-bottom: 2px; }
.result-title.win { color: var(--green); }
.result-title.lose { color: var(--red); }
.result-amt { font-size: 19px; font-weight: 900; }
.result-amt.win { color: var(--purple-light); text-shadow: 0 0 14px var(--purple-glow); }
.result-amt.lose { color: var(--red); }
.result-mult { font-size: 11px; color: var(--muted); margin-top: 2px; }

.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 24px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  transition: all 0.28s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 200;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

<!-- SVG символы -->
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="ico-gem" viewBox="0 0 40 40">
    <defs>
      <radialGradient id="gem-glow" cx="45%" cy="35%" r="65%">
        <stop offset="0%" stop-color="#e9d5ff"/>

        <stop offset="100%" stop-color="#5b21b6"/>
      </radialGradient>
      <radialGradient id="gem-face-top" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#f3e8ff" stop-opacity="1"/>
        <stop offset="100%" stop-color="#e9d5ff" stop-opacity="0.9"/>
      </radialGradient>
      <linearGradient id="gem-left" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#d8b4fe"/>
        <stop offset="100%" stop-color="#a855f7"/>
      </linearGradient>
      <linearGradient id="gem-right" x1="100%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#9333ea"/>
        <stop offset="100%" stop-color="#6d28d9"/>
      </linearGradient>
      <linearGradient id="gem-bot-left" x1="0%" y1="0%" x2="60%" y2="100%">
        <stop offset="0%" stop-color="#a855f7"/>
        <stop offset="100%" stop-color="#7c3aed"/>
      </linearGradient>
      <linearGradient id="gem-bot-right" x1="100%" y1="0%" x2="40%" y2="100%">
        <stop offset="0%" stop-color="#7c3aed"/>
        <stop offset="100%" stop-color="#4c1d95"/>
      </linearGradient>
      <filter id="gem-blur">
        <feGaussianBlur in="SourceGraphic" stdDeviation="0.5"/>
      </filter>
    </defs>
    <!-- тень/свечение под алмазом -->
    <ellipse cx="20" cy="37" rx="9" ry="2.5" fill="#c084fc" opacity="0.25" filter="url(#gem-blur)"/>
    <!-- верхняя площадка (корона) -->
    <polygon points="14,8 26,8 23,14 17,14" fill="url(#gem-face-top)"/>
    <!-- левая верхняя грань -->
    <polygon points="8,16 14,8 17,14" fill="#ddd6fe"/>
    <!-- правая верхняя грань -->
    <polygon points="32,16 26,8 23,14" fill="#c4b5fd"/>
    <!-- левая нижняя грань -->
    <polygon points="8,16 17,14 20,35" fill="url(#gem-bot-left)"/>
    <!-- центр-левая нижняя -->
    <polygon points="17,14 23,14 20,35" fill="#9333ea"/>
    <!-- правая нижняя грань -->
    <polygon points="32,16 23,14 20,35" fill="url(#gem-bot-right)"/>
    <!-- пояс (girdle) -->
    <polygon points="8,16 17,14 23,14 32,16" fill="#c084fc" opacity="0.6"/>
    <!-- контуры -->
    <polygon points="14,8 26,8 32,16 20,35 8,16" fill="none" stroke="#4c1d95" stroke-width="0.8" stroke-linejoin="round"/>
    <line x1="17" y1="14" x2="23" y2="14" stroke="#7c3aed" stroke-width="0.6" opacity="0.8"/>
    <line x1="8" y1="16" x2="17" y2="14" stroke="#7c3aed" stroke-width="0.5" opacity="0.6"/>
    <line x1="32" y1="16" x2="23" y2="14" stroke="#7c3aed" stroke-width="0.5" opacity="0.6"/>
    <line x1="17" y1="14" x2="20" y2="35" stroke="#4c1d95" stroke-width="0.5" opacity="0.5"/>
    <line x1="23" y1="14" x2="20" y2="35" stroke="#4c1d95" stroke-width="0.5" opacity="0.5"/>
    <!-- главный блик (звезда) -->
    <line x1="16" y1="11" x2="16" y2="7" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.95"/>
    <line x1="14" y1="11" x2="18" y2="11" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.95"/>
    <line x1="14.5" y1="9" x2="17.5" y2="13" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
    <line x1="17.5" y1="9" x2="14.5" y2="13" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
    <!-- маленький блик верхний правый -->
    <circle cx="24" cy="9" r="1.2" fill="white" opacity="0.8"/>
    <!-- микро бликs на гранях -->
    <line x1="11" y1="22" x2="13" y2="20" stroke="white" stroke-width="0.6" stroke-linecap="round" opacity="0.35"/>
  </symbol>

  <symbol id="ico-mine" viewBox="0 0 40 40">
    <defs>
      <radialGradient id="mine-g1" cx="40%" cy="35%" r="60%">
        <stop offset="0%" stop-color="#c4b5fd"/>
        <stop offset="100%" stop-color="#5b21b6"/>
      </radialGradient>
    </defs>
    <!-- шипы -->
    <line x1="20" y1="4" x2="20" y2="10" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="30" x2="20" y2="36" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4" y1="20" x2="10" y2="20" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="30" y1="20" x2="36" y2="20" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="8" y1="8" x2="13" y2="13" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
    <line x1="27" y1="27" x2="32" y2="32" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
    <line x1="32" y1="8" x2="27" y2="13" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="32" x2="13" y2="27" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
    <!-- тело -->
    <circle cx="20" cy="20" r="10" fill="url(#mine-g1)" stroke="#7c3aed" stroke-width="1.2"/>
    <!-- блик -->
    <circle cx="16" cy="16" r="3" fill="white" opacity="0.3"/>
    <circle cx="15" cy="15" r="1.2" fill="white" opacity="0.5"/>
  </symbol>

  <symbol id="ico-boom" viewBox="0 0 40 40">
    <defs>
      <radialGradient id="boom-g1" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#fca5a5"/>
        <stop offset="60%" stop-color="#ef4444"/>
        <stop offset="100%" stop-color="#991b1b"/>
      </radialGradient>
    </defs>
    <!-- лучи взрыва -->
    <line x1="20" y1="2" x2="20" y2="8" stroke="#fca5a5" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>

    <line x1="34" y1="6" x2="29" y2="11" stroke="#fca5a5" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="6" y1="34" x2="11" y2="29" stroke="#fca5a5" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <!-- ядро -->
    <circle cx="20" cy="20" r="11" fill="url(#boom-g1)"/>
    <circle cx="15" cy="15" r="3.5" fill="white" opacity="0.25"/>
    <circle cx="14" cy="14" r="1.5" fill="white" opacity="0.45"/>
  </symbol>
</svg>

  <div class="info-item">

  <div class="info-item">
    <div class="info-val" id="info-next">×1.00</div>
    <div class="info-lbl">Следующий</div>
  </div>
  <div class="info-item">
    <div class="info-val" id="info-payout">0</div>
    <div class="info-lbl">Выигрыш 🪙</div>
  </div>
</div>

<!-- Настройки (снизу) -->
<div class="settings" id="settings-panel">
  <div class="setting-row">
    <span class="setting-label">Ставка</span>
    <div class="bet-input-wrap">
      <button class="bet-mod" onclick="multBet(0.5)">½</button>
      <button class="bet-mod" onclick="multBet(2)">×2</button>
      <input id="bet-input" type="number" value="500" min="100" step="100">
      <button class="bet-mod" onclick="setBetAll()">MAX</button>
    </div>
  </div>
  <div class="setting-row">
    <span class="setting-label">Мины</span>
    <div class="chips" id="mines-opts"></div>
    <input id="mines-input" type="number" class="mines-input" min="1" max="24" value="3" inputmode="numeric">
  </div>
</div>

<!-- Кнопки -->
<div class="btn-row">
  <button class="btn btn-start" id="btn-start" onclick="startGame()">🚀 Начать</button>
  <button class="btn btn-cashout" id="btn-cashout" onclick="cashout()" style="display:none">💰 Забрать</button>
</div>

<!-- Результат -->
<div class="result-toast" id="result-overlay">
  <div class="result-icon" id="res-icon"></div>
  <div class="result-body">
    <div class="result-title" id="res-title"></div>
    <div class="result-amt" id="res-amt"></div>
    <div class="result-mult" id="res-mult"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const API = "https://bot-1782901267-5094-bringnice.bothost.tech";
const CELLS = 25;

let state = {
  playing: false, gameId: null, bet: 500, mineCount: 3,
  gemsFound: 0, revealed: [], mult: 1.0, nextMult: 1.0, balance: 0,
};

document.addEventListener("DOMContentLoaded", async () => {
  buildMineOpts();
  buildGrid();
  setupMinesInput();
  await loadBalance();
  await checkActiveGame();
});

function syncMinesUI(n) {
  const input = document.getElementById("mines-input");
  if (input) input.value = n;
  document.querySelectorAll("#mines-opts .chip").forEach(b => b.classList.toggle("active", parseInt(b.dataset.n, 10) === n));
}

function setupMinesInput() {
  const input = document.getElementById("mines-input");
  if (!input) return;
  input.value = state.mineCount;
  const apply = () => {
    let v = parseInt(input.value, 10);
    if (isNaN(v)) v = state.mineCount;
    v = Math.max(1, Math.min(24, v));
    state.mineCount = v;
    syncMinesUI(v);
  };
  input.addEventListener("input", apply);
  input.addEventListener("blur", apply);
}

function svgUse(id) {
  return `<svg class="cell-inner" viewBox="0 0 40 40"><use href="#${id}"/></svg>`;
}

function buildMineOpts() {
  const row = document.getElementById("mines-opts");
  [1, 2, 3, 5, 10, 15, 24].forEach(n => {
    const btn = document.createElement("button");
    btn.className = "chip" + (n === state.mineCount ? " active" : "");
    btn.dataset.n = n;
    btn.innerHTML = `${n} <svg width="11" height="11" viewBox="0 0 40 40"><use href="#ico-mine"/></svg>`;
    btn.onclick = () => {
      state.mineCount = n;
      syncMinesUI(n);
    };
    row.appendChild(btn);
  });
}

function buildGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  for (let i = 0; i < CELLS; i++) {
    const cell = document.createElement("div");
    cell.className = "cell hidden";
    cell.id = `cell-${i}`;
    cell.innerHTML = `<span class="cell-q">?</span>`;
    cell.onclick = () => clickCell(i);
    grid.appendChild(cell);
  }
}

async function loadBalance() {
  try {
    const r = await api("GET", "/api/balance");
    if (r.ok) { state.balance = r.balance; document.getElementById("balance-val").textContent = fmt(r.balance); }
  } catch(e) {}
}

async function checkActiveGame() {
  try {
    const r = await api("GET", "/api/mines/state");
    if (r.ok && r.active) {
      state.playing = true; state.gameId = r.game_id; state.bet = r.bet;
      state.mineCount = r.mine_count; state.gemsFound = r.gems_found;
      state.revealed = r.revealed; state.mult = r.mult; state.nextMult = r.next_mult;
      syncMinesUI(r.mine_count);
      enterPlayMode();
      r.revealed.forEach(idx => setCell(idx, "gem"));
      updateInfo();
    }
  } catch(e) {}
}

async function api(method, path, body) {
  const opts = { method, headers: { "Content-Type": "application/json", "X-Init-Data": tg.initData } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  return res.json();
}

async function startGame() {
  const bet = parseFloat(document.getElementById("bet-input").value);
  if (!bet || bet < 100) { showToast("Минимальная ставка 100 Ucoin"); return; }
  if (bet > state.balance) { showToast("Недостаточно средств"); return; }
  document.getElementById("btn-start").disabled = true;
  clearTimeout(resultTimer);
  document.getElementById("result-overlay").classList.remove("show");
  try {
    const r = await api("POST", "/api/mines/start", { bet, mine_count: state.mineCount });
    if (!r.ok) { showToast(r.error); document.getElementById("btn-start").disabled = false; return; }
    state.playing = true; state.gameId = r.game_id; state.bet = r.bet;
    state.mineCount = r.mine_count; state.gemsFound = 0; state.revealed = [];
    state.mult = 1.0; state.nextMult = r.next_mult;
    state.balance -= bet;
    document.getElementById("balance-val").textContent = fmt(state.balance);
    buildGrid(); enterPlayMode(); updateInfo();
    tg.HapticFeedback.impactOccurred("medium");
  } catch(e) { showToast("Ошибка соединения"); document.getElementById("btn-start").disabled = false; }
}

async function clickCell(idx) {
  if (!state.playing) return;
  if (state.revealed.includes(idx)) return;
  setGridDisabled(true);
  try {
    const r = await api("POST", "/api/mines/click", { game_id: state.gameId, cell: idx });
    if (!r.ok) { showToast(r.error); setGridDisabled(false); return; }
    if (r.result === "lose") {
      setCell(idx, "exploded");
      r.mines.forEach(m => { if (m !== idx) setCell(m, "mine"); });
      state.playing = false;
      tg.HapticFeedback.notificationOccurred("error");
      await sleep(700);
      showResult(false, state.bet, r.mult);
      exitPlayMode();
    } else if (r.result === "win_all") {
      setCell(idx, "gem");
      state.gemsFound = r.gems_found; state.mult = r.mult;
      state.balance = r.new_balance;
      document.getElementById("balance-val").textContent = fmt(state.balance);
      state.playing = false; updateInfo();
      tg.HapticFeedback.notificationOccurred("success");
      await sleep(400);
      showResult(true, r.payout - state.bet, r.mult);
      exitPlayMode();
    } else {
      setCell(idx, "gem");
      state.revealed.push(idx); state.gemsFound = r.gems_found;
      state.mult = r.mult; state.nextMult = r.next_mult;
      updateInfo(); setGridDisabled(false);
      tg.HapticFeedback.impactOccurred("light");
    }
  } catch(e) { showToast("Ошибка соединения"); setGridDisabled(false); }
}

async function cashout() {
  if (!state.playing || state.gemsFound === 0) return;
  document.getElementById("btn-cashout").disabled = true;
  setGridDisabled(true);
  try {
    const r = await api("POST", "/api/mines/cashout", { game_id: state.gameId });
    if (!r.ok) { showToast(r.error); document.getElementById("btn-cashout").disabled = false; setGridDisabled(false); return; }
    r.mines.forEach(m => setCell(m, "mine"));
    state.balance = r.new_balance;
    document.getElementById("balance-val").textContent = fmt(state.balance);
    state.playing = false;
    tg.HapticFeedback.notificationOccurred("success");
    await sleep(400);
    showResult(true, r.payout - state.bet, r.mult);
    exitPlayMode();
  } catch(e) { showToast("Ошибка соединения"); document.getElementById("btn-cashout").disabled = false; setGridDisabled(false); }
}

function enterPlayMode() {
  document.getElementById("settings-panel").style.display = "none";
  document.getElementById("info-row").style.display = "flex";
  document.getElementById("btn-start").style.display = "none";
  document.getElementById("btn-cashout").style.display = "block";
  document.getElementById("btn-cashout").disabled = true;
}

function exitPlayMode() {
  document.getElementById("settings-panel").style.display = "block";
  document.getElementById("info-row").style.display = "none";
  document.getElementById("btn-start").style.display = "block";
  document.getElementById("btn-start").disabled = false;
  document.getElementById("btn-cashout").style.display = "none";
}

function updateInfo() {
  const payout = Math.round(state.bet * state.mult);
  document.getElementById("info-mult").textContent = `×${state.mult.toFixed(2)}`;
  document.getElementById("info-next").textContent = `×${state.nextMult.toFixed(2)}`;
  document.getElementById("info-payout").textContent = fmt(payout);
  if (state.gemsFound > 0) {
    const cb = document.getElementById("btn-cashout");
    cb.disabled = false;
    cb.innerHTML = `💰 Забрать (${fmt(payout)})`;
  }
}

function setCell(idx, type) {
  const cell = document.getElementById(`cell-${idx}`);
  if (!cell) return;
  cell.classList.remove("hidden", "gem", "mine", "exploded");
  cell.classList.add(type, "disabled");
  if (type === "gem")       cell.innerHTML = svgUse("ico-gem");
  else if (type === "mine") cell.innerHTML = svgUse("ico-mine");
  else if (type === "exploded") cell.innerHTML = svgUse("ico-boom");
}

function setGridDisabled(val) {
  document.querySelectorAll(".cell.hidden").forEach(c => { c.style.pointerEvents = val ? "none" : ""; });
}

let resultTimer = null;
function showResult(win, profit, mult) {
  document.getElementById("res-icon").textContent = win ? "💎" : "💥";
  const title = document.getElementById("res-title");
  title.textContent = win ? "Победа!" : "Взрыв!";
  title.className = "result-title " + (win ? "win" : "lose");
  const amt = document.getElementById("res-amt");
  amt.textContent = (win ? "+" : "-") + fmt(Math.abs(Math.round(profit))) + " 🪙";
  amt.className = "result-amt " + (win ? "win" : "lose");
  document.getElementById("res-mult").textContent = win ? `множитель ×${mult.toFixed(2)}` : "Удачи в следующий раз!";
  const overlay = document.getElementById("result-overlay");
  overlay.classList.add("show");
  clearTimeout(resultTimer);
  resultTimer = setTimeout(() => {
    overlay.classList.remove("show");
    // не трогаем поле, если пользователь уже успел начать новую игру
    if (!state.playing) {
      buildGrid();
      state.gameId = null; state.gemsFound = 0; state.revealed = [];
    }
  }, 3200);
}

function multBet(f) { const i = document.getElementById("bet-input"); i.value = Math.max(100, Math.round(parseFloat(i.value||500)*f)); }
function setBetAll() { document.getElementById("bet-input").value = Math.floor(state.balance); }
function fmt(n) { return Math.round(n).toLocaleString("ru-RU"); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}
</script>
</div>
</body>
</html>
