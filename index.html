<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Umbrex</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0a0818; --card: #111027; --card2: #181530; --border: #2a2548;
  --purple: #8b5cf6; --purple-light: #a78bfa; --purple-dark: #5b21b6;
  --purple-glow: rgba(139,92,246,0.4); --green: #34d399; --green-glow: rgba(52,211,153,0.3);
  --red: #f87171; --red-glow: rgba(248,113,113,0.3); --orange: #fb923c;
  --text: #f0eeff; --muted: #6d6a8a; --muted2: #3a3760;
}
html,body { height:100%; overflow:hidden; }
body {
  font-family: -apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%,rgba(80,30,140,.55) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%,rgba(60,20,120,.45) 0%,transparent 55%),
    radial-gradient(ellipse 100% 100% at 50% 50%,#0a0818 40%,#130c2a 100%);
  color:var(--text); display:flex; justify-content:center;
}

/* SCREENS */
.screen {
  display:none; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:480px; height:100vh;
  flex-direction:column; overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch; padding-bottom:24px;
}
.screen.active { display:flex; }

/* HEADER */
.header { position:relative; z-index:10; padding:14px 16px 10px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.header-back { width:38px;height:38px;border-radius:12px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .15s;flex-shrink:0; }
.header-back:active { transform:scale(.9);background:var(--card2); }
.header-title { text-align:center; }
.header-title h1 { font-size:17px;font-weight:800; }
.header-title p { font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:1px; }
.balance-card { background:var(--card);border:1px solid var(--border);border-radius:14px;padding:7px 12px;text-align:right; }
.balance-label { font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px; }
.balance-amount { font-size:15px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:4px;margin-top:1px;justify-content:flex-end; }

/* ══════════ МЕНЮ ══════════ */
.menu-logo { font-size:36px;font-weight:900;background:linear-gradient(135deg,#e9d5ff,#a855f7,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px; }
.menu-sub { font-size:12px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:2px; }
.menu-balance-big { position:relative;z-index:10;margin:0 16px 24px;background:linear-gradient(145deg,rgba(20,16,44,.95),rgba(14,10,30,.98));border:1px solid rgba(60,48,100,.7);border-radius:20px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 8px 32px rgba(0,0,0,.3); }
.menu-balance-big .lbl { font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px; }
.menu-balance-big .val { font-size:30px;font-weight:900;color:var(--text);margin-top:4px;display:flex;align-items:center;gap:8px; }
.menu-balance-btn { background:linear-gradient(135deg,#7c3aed,#5b21b6);border:none;border-radius:14px;color:#fff;font-size:13px;font-weight:800;padding:10px 18px;cursor:pointer;box-shadow:0 4px 16px rgba(124,58,237,.4);transition:transform .1s; }
.menu-balance-btn:active { transform:scale(.94); }
.menu-section-title { position:relative;z-index:10;padding:0 20px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;flex-shrink:0; }
.games-grid { position:relative;z-index:10;display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:0 16px;flex-shrink:0; }
.game-card { border-radius:20px;padding:18px 16px;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s;border:1px solid transparent;min-height:140px;display:flex;flex-direction:column;justify-content:flex-end; }
.game-card:active { transform:scale(.96); }
.game-card-mines { background:linear-gradient(145deg,#0f1f3a,#0a1628);border-color:rgba(52,211,153,.3);box-shadow:0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(52,211,153,.1); }
.game-card-crash { background:linear-gradient(145deg,#1a0f2e,#100920);border-color:rgba(251,146,60,.3);box-shadow:0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(251,146,60,.1); }
.game-card-icon { font-size:46px;line-height:1;margin-bottom:10px; }
.game-card-name { font-size:16px;font-weight:900;margin-bottom:2px; }
.game-card-desc { font-size:11px;color:var(--muted); }
.game-card-badge { position:absolute;top:12px;right:12px;border-radius:8px;padding:3px 8px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px; }
.badge-green { background:rgba(52,211,153,.2);color:var(--green);border:1px solid rgba(52,211,153,.3); }
.badge-orange { background:rgba(251,146,60,.2);color:var(--orange);border:1px solid rgba(251,146,60,.3); }
.game-card-glow-mines { position:absolute;top:-20px;right:-20px;width:100px;height:100px;background:radial-gradient(circle,rgba(52,211,153,.15) 0%,transparent 70%);pointer-events:none; }
.game-card-glow-crash { position:absolute;top:-20px;right:-20px;width:100px;height:100px;background:radial-gradient(circle,rgba(251,146,60,.15) 0%,transparent 70%);pointer-events:none; }

/* ══════════ МИНЫ ══════════ */
.grid-wrap { position:relative;z-index:10;margin:0 14px 16px;background:linear-gradient(145deg,rgba(18,14,38,.95),rgba(14,10,30,.98));border:1px solid rgba(60,48,100,.6);border-radius:22px;padding:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 60px rgba(80,30,180,.12),inset 0 1px 0 rgba(255,255,255,.04),inset 0 0 40px rgba(30,15,70,.3);flex-shrink:0; }
.grid { display:grid;grid-template-columns:repeat(5,1fr);gap:10px;width:100%; }
.cell { aspect-ratio:1;border-radius:14px;background:linear-gradient(145deg,#1c1635,#16112b);border:1px solid rgba(55,42,100,.7);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s,background .2s,border-color .2s,box-shadow .2s;user-select:none;-webkit-user-select:none;position:relative;overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,.06),inset 0 -1px 0 rgba(0,0,0,.3),0 2px 8px rgba(0,0,0,.4); }
.cell::before { content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.07) 0%,transparent 100%);border-radius:14px 14px 0 0;pointer-events:none; }
.cell-inner { width:75%;height:75%;position:relative;z-index:1; }
.cell.hidden .cell-q { font-size:18px;font-weight:800;color:rgba(100,85,160,.7);line-height:1;text-shadow:0 0 8px rgba(139,92,246,.15); }
.cell.hidden:active { transform:scale(.88);background:#1e1a38; }
.cell.gem { background:linear-gradient(145deg,#0c3025,#0f3d2e);border:2px solid var(--green);box-shadow:0 0 20px rgba(52,211,153,.5),0 0 40px rgba(52,211,153,.2),inset 0 0 16px rgba(52,211,153,.08),inset 0 1px 0 rgba(52,211,153,.2);animation:popIn .3s cubic-bezier(.36,.07,.19,.97); }
.cell.mine { background:linear-gradient(145deg,#1a0f38,#221545);border-color:var(--purple);box-shadow:0 0 14px var(--purple-glow); }
.cell.exploded { background:linear-gradient(145deg,#2e0f0f,#3d1212);border-color:var(--red);box-shadow:0 0 22px var(--red-glow);animation:boom .4s ease; }
.cell.disabled { cursor:default;pointer-events:none; }
@keyframes popIn { 0%{transform:scale(.7);opacity:.4} 65%{transform:scale(1.12)} 100%{transform:scale(1);opacity:1} }
@keyframes boom { 0%{transform:scale(1.18) rotate(-5deg)} 30%{transform:scale(.87) rotate(4deg)} 65%{transform:scale(1.05) rotate(-2deg)} 100%{transform:scale(1) rotate(0)} }
.info-row { position:relative;z-index:10;margin:0 14px 16px;background:linear-gradient(145deg,rgba(18,14,38,.97),rgba(13,10,28,.99));border:1px solid rgba(55,42,100,.6);border-radius:16px;padding:13px 16px;display:flex;flex-shrink:0;box-shadow:inset 0 1px 0 rgba(255,255,255,.04); }
.info-item { flex:1;text-align:center;position:relative; }
.info-item+.info-item::before { content:'';position:absolute;left:0;top:15%;bottom:15%;width:1px;background:var(--border); }
.info-val { font-size:20px;font-weight:900;color:var(--purple-light);text-shadow:0 0 14px rgba(167,139,250,.6),0 0 30px rgba(139,92,246,.3); }
.info-item:last-child .info-val { color:#c084fc;text-shadow:0 0 14px rgba(192,132,252,.6); }
.info-lbl { font-size:9px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:1px;font-weight:600; }
.settings { position:relative;z-index:10;margin:0 14px 16px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;flex-shrink:0; }
.setting-row { display:flex;align-items:center;gap:8px;margin-bottom:12px; }
.setting-row:last-child { margin-bottom:0; }
.setting-label { font-size:10px;color:var(--muted);min-width:42px;text-transform:uppercase;letter-spacing:.6px; }
.chips { display:flex;gap:5px;flex-wrap:wrap;flex:1; }
.chip { background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:5px 9px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:3px; }
.chip.active { background:rgba(139,92,246,.18);border-color:var(--purple);color:var(--purple-light);box-shadow:0 0 10px var(--purple-glow); }
.chip:active { transform:scale(.9); }
.bet-input-wrap { display:flex;align-items:center;gap:4px;flex:1; }
.bet-inp { background:var(--card2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:14px;font-weight:700;flex:1;width:0;padding:5px 8px;text-align:center;outline:none;transition:border-color .15s; }
.bet-inp:focus { border-color:var(--purple); }
.bet-mod { background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:11px;font-weight:700;padding:5px 8px;cursor:pointer;white-space:nowrap;transition:all .12s; }
.bet-mod:active { border-color:var(--purple);color:var(--purple-light); }
.mines-input { background:var(--card2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;font-weight:700;width:46px;flex-shrink:0;padding:5px 4px;text-align:center;outline:none;transition:border-color .15s; }
.mines-input:focus { border-color:var(--purple); }
.btn-row { position:relative;z-index:10;padding:0 14px 6px;display:flex;gap:10px;flex-shrink:0; }
.btn { flex:1;padding:15px;border:none;border-radius:16px;font-size:15px;font-weight:800;cursor:pointer;transition:transform .1s,box-shadow .15s;display:flex;align-items:center;justify-content:center;gap:7px; }
.btn:active { transform:scale(.95); }
.btn:disabled { opacity:.35;cursor:default; }
.btn-start { background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;box-shadow:0 6px 24px rgba(124,58,237,.45); }
.btn-cashout { background:linear-gradient(135deg,#059669,#047857);color:#fff;box-shadow:0 6px 24px rgba(5,150,105,.35); }

/* ══════════ КРАШ ══════════ */
#screen-crash { overflow:hidden; padding-bottom:0; }

.crash-header {
  position:relative; z-index:10; padding:12px 16px 10px;
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.crash-header-back {
  width:38px; height:38px; border-radius:12px;
  background:var(--card); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:18px; transition:all .15s; flex-shrink:0;
}
.crash-header-back:active { transform:scale(.9); background:var(--card2); }
.crash-header-title { font-size:17px; font-weight:800; }
.crash-header-bal {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:7px 12px;
  font-size:13px; font-weight:800; color:var(--text);
}

/* история */
.crash-history-bar {
  position:relative; z-index:10;
  display:flex; gap:6px; overflow-x:auto; flex-shrink:0;
  padding:6px 14px; scrollbar-width:none;
}
.crash-history-bar::-webkit-scrollbar { display:none; }
.ch-item {
  flex-shrink:0; border-radius:9px; padding:4px 10px;
  font-size:12px; font-weight:800; border:1px solid transparent;
}
.ch-item.low  { background:rgba(139,92,246,.15); border-color:rgba(139,92,246,.35); color:#a78bfa; }
.ch-item.mid  { background:rgba(96,165,250,.15); border-color:rgba(96,165,250,.35); color:#93c5fd; }
.ch-item.high { background:rgba(52,211,153,.15); border-color:rgba(52,211,153,.35); color:#34d399; }
.ch-item.mega { background:rgba(251,191,36,.15); border-color:rgba(251,191,36,.4);  color:#fbbf24; }

/* поле графика */
.crash-field {
  position:relative; flex-shrink:0;
  margin:0 14px 10px; border-radius:20px; overflow:hidden;
  height:220px;
  background:
    radial-gradient(ellipse 70% 60% at 10% 90%, rgba(80,30,140,.4) 0%, transparent 65%),
    radial-gradient(ellipse 50% 50% at 90% 10%, rgba(60,20,120,.3) 0%, transparent 60%),
    linear-gradient(160deg,#0e0b22 0%,#130a2a 60%,#0a0618 100%);
  border:1px solid rgba(80,50,140,.4);
  box-shadow: inset 0 0 40px rgba(60,20,120,.25);
}
#crash-canvas { display:block; width:100%; height:100%; }

.crash-big-mult {
  position:absolute; top:0; left:0; right:0; bottom:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  pointer-events:none;
}
.crash-big-val {
  font-size:62px; font-weight:900; line-height:1; letter-spacing:-2px;
  transition:color .3s, text-shadow .3s;
}
.crash-big-val.flying  { color:#c084fc; text-shadow:0 0 30px rgba(192,132,252,.7),0 0 60px rgba(139,92,246,.4); }
.crash-big-val.waiting { font-size:18px; color:var(--muted); letter-spacing:1px; text-shadow:none; font-weight:600; }
.crash-big-val.crashed { color:#f87171; text-shadow:0 0 30px rgba(248,113,113,.8); }
.crash-big-val.crashed-gold { color:#8b5cf6; text-shadow:0 0 30px rgba(139,92,246,.9), 0 0 60px rgba(139,92,246,.4); }

.crash-countdown-wrap {
  pointer-events:none; display:flex; flex-direction:column; align-items:center;
  gap:6px; margin-top:12px; width:140px;
}
.crash-countdown-bar {
  width:100%; height:4px; border-radius:4px; overflow:hidden;
  background:rgba(139,92,246,.15);
}
.crash-countdown-fill {
  height:100%; width:100%; border-radius:4px;
  background:linear-gradient(90deg,#7c3aed,#c084fc);
  transition:width .1s linear;
}
.crash-countdown-txt { font-size:11px; font-weight:700; color:var(--muted); letter-spacing:.3px; }

@keyframes crashShake {
  0%,100% { transform:translate(0,0); }
  20% { transform:translate(-6px,3px); }
  40% { transform:translate(5px,-4px); }
  60% { transform:translate(-4px,3px); }
  80% { transform:translate(3px,-2px); }
}
.crash-field.shake { animation:crashShake .35s ease; }
.crash-field.flash::after {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:rgba(248,113,113,.32); animation:crashFlash .45s ease-out forwards;
}
@keyframes crashFlash { 0%{opacity:1} 100%{opacity:0} }

#crash-rocket {
  position:absolute; font-size:22px; pointer-events:none;
  transform:translate(-50%,-50%);
  filter:drop-shadow(0 0 8px rgba(167,139,250,.9));
  display:none;
}

/* панель */
.crash-panel {
  position:relative; z-index:10; margin:0 14px 10px;
  background:linear-gradient(145deg,rgba(18,14,38,.97),rgba(13,10,28,.99));
  border:1px solid rgba(55,42,100,.6); border-radius:18px;
  padding:14px 14px 12px; flex-shrink:0;
}
.crash-panel-label {
  font-size:10px; color:var(--muted); text-transform:uppercase;
  letter-spacing:1px; font-weight:700; margin-bottom:7px;
}
.crash-bet-big {
  background:rgba(10,8,24,.7); border:1px solid rgba(60,50,100,.6);
  border-radius:12px; padding:11px 14px;
  font-size:22px; font-weight:900; color:#fff;
  width:100%; outline:none; margin-bottom:8px; transition:border-color .15s;
}
.crash-bet-big:focus { border-color:var(--purple); }

.crash-quick-bets { display:flex; gap:5px; margin-bottom:12px; }
.cqb {
  background:var(--card2); border:1px solid var(--border);
  border-radius:10px; padding:7px 0;
  font-size:12px; font-weight:700; color:var(--muted);
  cursor:pointer; transition:all .15s; flex:1; text-align:center;
}
.cqb:active { background:rgba(139,92,246,.18); border-color:var(--purple); color:var(--purple-light); transform:scale(.93); }

.crash-auto-row { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.crash-auto-inp {
  flex:1; background:rgba(10,8,24,.7); border:1px solid rgba(60,50,100,.6);
  border-radius:10px; padding:9px 12px;
  font-size:14px; font-weight:700; color:#fff;
  outline:none; transition:border-color .15s;
}
.crash-auto-inp:focus { border-color:var(--purple-light); }
.crash-auto-inp::placeholder { color:var(--muted); font-weight:500; }
.crash-auto-clear {
  width:34px; height:34px; border-radius:10px; flex-shrink:0;
  background:var(--card2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--muted); font-size:14px; font-weight:700; transition:all .15s;
}
.crash-auto-clear:active { border-color:var(--red); color:var(--red); }

/* кнопка краша */
.crash-main-btn {
  width:100%; padding:15px; border:none; border-radius:14px;
  font-size:15px; font-weight:800; cursor:pointer;
  transition:transform .1s, opacity .2s;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.crash-main-btn:active { transform:scale(.96); }
.crash-main-btn:disabled { opacity:.4; cursor:default; }
.cmb-waiting { background:var(--card2); color:var(--muted); border:1px solid var(--border); }
.cmb-ready   {
  background:linear-gradient(135deg,#7c3aed,#5b21b6); color:#fff;
  box-shadow:0 6px 24px rgba(124,58,237,.45);
  animation:readyPulse 1.8s ease-in-out infinite;
}
@keyframes readyPulse{0%,100%{box-shadow:0 6px 24px rgba(124,58,237,.45)}50%{box-shadow:0 8px 34px rgba(167,139,250,.7)}}
.cmb-placed  { background:linear-gradient(135deg,#0d6e4e,#065f46); color:#fff; box-shadow:0 4px 16px rgba(5,150,105,.3); }
.cmb-cashout {
  background:linear-gradient(135deg,#7c3aed,#a855f7); color:#fff;
  box-shadow:0 6px 24px rgba(139,92,246,.5);
  animation:pulseBtn 1s ease-in-out infinite;
}
@keyframes pulseBtn{0%,100%{box-shadow:0 6px 24px rgba(139,92,246,.5)}50%{box-shadow:0 6px 36px rgba(167,139,250,.8)}}

/* игроки */
.crash-players {
  position:relative; z-index:10; margin:0 14px 10px;
  background:linear-gradient(145deg,rgba(18,14,38,.97),rgba(13,10,28,.99));
  border:1px solid rgba(55,42,100,.6); border-radius:18px;
  padding:12px 14px; flex-shrink:0;
}
.crash-players-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.crash-players-title { font-size:14px; font-weight:800; }
.crash-players-count { background:var(--purple-dark); border-radius:20px; padding:2px 10px; font-size:12px; font-weight:800; }
.crash-player-row { display:flex; align-items:center; gap:10px; padding:7px 0; border-top:1px solid rgba(42,37,72,.5); }
.crash-player-avatar { width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg,#7c3aed,#5b21b6); display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
.crash-player-name { flex:1; font-size:13px; font-weight:600; color:var(--text); }
.crash-player-mult { font-size:12px; font-weight:800; padding:2px 8px; border-radius:7px; }
.crash-player-mult.won     { background:rgba(52,211,153,.15); color:var(--green); }
.crash-player-mult.lost    { background:rgba(248,113,113,.12); color:var(--red); }
.crash-player-mult.playing { background:rgba(139,92,246,.15); color:var(--purple-light); }

/* живой счётчик суммы под графиком */
.crash-payout-bar {
  position:relative; z-index:10; margin:-4px 14px 8px;
  background:linear-gradient(135deg,rgba(52,211,153,.08),rgba(52,211,153,.04));
  border:1px solid rgba(52,211,153,.3); border-radius:14px;

<script>
const tg = window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}
const API = "https://bot-1782901267-5094-bringnice.bothost.tech";
let sharedBalance = 0;

// ── NAV ──
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goMenu(){showScreen('screen-menu');}
function openMines(){showScreen('screen-mines');document.getElementById('mines-balance-val').textContent=fmt(sharedBalance);buildGrid();buildMineOpts();setupMinesInput();checkActiveGame();}
function openCrash(){showScreen('screen-crash');document.getElementById('crash-balance-val').textContent=fmt(sharedBalance);initCrash();}

// ── API ──
async function apiCall(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json','X-Init-Data':tg?.initData||''}};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(API+path,opts);return res.json();
}
async function loadBalance(){
  try{const r=await apiCall('GET','/api/balance');if(r.ok){sharedBalance=r.balance;document.getElementById('menu-balance-val').textContent=fmt(sharedBalance);}}catch(e){}
}

// ── МИНЫ ──
const CELLS=25;
let MS={playing:false,gameId:null,bet:500,mineCount:3,gemsFound:0,revealed:[],mult:1,nextMult:1};
function syncMinesUI(n){const i=document.getElementById('mines-input');if(i)i.value=n;document.querySelectorAll('#mines-opts .chip').forEach(b=>b.classList.toggle('active',+b.dataset.n===n));}
function setupMinesInput(){const i=document.getElementById('mines-input');if(!i)return;i.value=MS.mineCount;const a=()=>{let v=parseInt(i.value);if(isNaN(v))v=MS.mineCount;v=Math.max(1,Math.min(24,v));MS.mineCount=v;syncMinesUI(v);};i.addEventListener('input',a);i.addEventListener('blur',a);}
function svgUse(id){return`<svg class="cell-inner" viewBox="0 0 100 100"><use href="#${id}"/></svg>`;}
function buildMineOpts(){const row=document.getElementById('mines-opts');if(!row)return;row.innerHTML='';[1,2,3,5,10,15,24].forEach(n=>{const b=document.createElement('button');b.className='chip'+(n===MS.mineCount?' active':'');b.dataset.n=n;b.innerHTML=`${n}<svg width="11" height="11" viewBox="0 0 40 40"><use href="#ico-mine"/></svg>`;b.onclick=()=>{MS.mineCount=n;syncMinesUI(n);};row.appendChild(b);});}
function buildGrid(){const g=document.getElementById('grid');if(!g)return;g.innerHTML='';for(let i=0;i<CELLS;i++){const c=document.createElement('div');c.className='cell hidden';c.id=`cell-${i}`;c.innerHTML='<span class="cell-q">?</span>';c.onclick=()=>clickCell(i);g.appendChild(c);}}
async function checkActiveGame(){try{const r=await apiCall('GET','/api/mines/state');if(r.ok&&r.active){MS.playing=true;MS.gameId=r.game_id;MS.bet=r.bet;MS.mineCount=r.mine_count;MS.gemsFound=r.gems_found;MS.revealed=r.revealed;MS.mult=r.mult;MS.nextMult=r.next_mult;syncMinesUI(r.mine_count);enterPlayMode();r.revealed.forEach(i=>setCell(i,'gem'));updateMinesInfo();}}catch(e){}}
async function startGame(){const bet=parseFloat(document.getElementById('bet-input').value);if(!bet||bet<100){showToast('Мин. ставка 100');return;}if(bet>sharedBalance){showToast('Недостаточно средств');return;}document.getElementById('btn-start').disabled=true;clearResultToast();try{const r=await apiCall('POST','/api/mines/start',{bet,mine_count:MS.mineCount});if(!r.ok){showToast(r.error);document.getElementById('btn-start').disabled=false;return;}MS.playing=true;MS.gameId=r.game_id;MS.bet=r.bet;MS.mineCount=r.mine_count;MS.gemsFound=0;MS.revealed=[];MS.mult=1;MS.nextMult=r.next_mult;sharedBalance-=bet;syncBalanceUI();buildGrid();enterPlayMode();updateMinesInfo();tg?.HapticFeedback?.impactOccurred('medium');}catch(e){showToast('Ошибка соединения');document.getElementById('btn-start').disabled=false;}}
async function clickCell(idx){if(!MS.playing||MS.revealed.includes(idx))return;setGridDisabled(true);try{const r=await apiCall('POST','/api/mines/click',{game_id:MS.gameId,cell:idx});if(!r.ok){showToast(r.error);setGridDisabled(false);return;}if(r.result==='lose'){setCell(idx,'exploded');r.mines.forEach(m=>{if(m!==idx)setCell(m,'mine');});MS.playing=false;tg?.HapticFeedback?.notificationOccurred('error');await sleep(700);showResult(false,MS.bet,r.mult);exitPlayMode();}else if(r.result==='win_all'){setCell(idx,'gem');MS.gemsFound=r.gems_found;MS.mult=r.mult;sharedBalance=r.new_balance;syncBalanceUI();MS.playing=false;updateMinesInfo();tg?.HapticFeedback?.notificationOccurred('success');await sleep(400);showResult(true,r.payout-MS.bet,r.mult);exitPlayMode();}else{setCell(idx,'gem');MS.revealed.push(idx);MS.gemsFound=r.gems_found;MS.mult=r.mult;MS.nextMult=r.next_mult;updateMinesInfo();setGridDisabled(false);tg?.HapticFeedback?.impactOccurred('light');}}catch(e){showToast('Ошибка');setGridDisabled(false);}}
async function cashout(){if(!MS.playing||MS.gemsFound===0)return;document.getElementById('btn-cashout').disabled=true;setGridDisabled(true);try{const r=await apiCall('POST','/api/mines/cashout',{game_id:MS.gameId});if(!r.ok){showToast(r.error);document.getElementById('btn-cashout').disabled=false;setGridDisabled(false);return;}r.mines.forEach(m=>setCell(m,'mine'));sharedBalance=r.new_balance;syncBalanceUI();MS.playing=false;tg?.HapticFeedback?.notificationOccurred('success');await sleep(400);showResult(true,r.payout-MS.bet,r.mult);exitPlayMode();}catch(e){showToast('Ошибка');document.getElementById('btn-cashout').disabled=false;setGridDisabled(false);}}
function enterPlayMode(){document.getElementById('settings-panel').style.display='none';document.getElementById('info-row').style.display='flex';document.getElementById('btn-start').style.display='none';document.getElementById('btn-cashout').style.display='block';document.getElementById('btn-cashout').disabled=true;}
function exitPlayMode(){document.getElementById('settings-panel').style.display='block';document.getElementById('info-row').style.display='none';document.getElementById('btn-start').style.display='block';document.getElementById('btn-start').disabled=false;document.getElementById('btn-cashout').style.display='none';}
function updateMinesInfo(){const p=Math.round(MS.bet*MS.mult);document.getElementById('info-mult').textContent=`×${MS.mult.toFixed(2)}`;document.getElementById('info-next').textContent=`×${MS.nextMult.toFixed(2)}`;document.getElementById('info-payout').textContent=fmt(p);if(MS.gemsFound>0){const cb=document.getElementById('btn-cashout');cb.disabled=false;cb.innerHTML=`💰 Забрать (${fmt(p)})`;}}
function setCell(idx,type){const c=document.getElementById(`cell-${idx}`);if(!c)return;c.classList.remove('hidden','gem','mine','exploded');c.classList.add(type,'disabled');if(type==='gem')c.innerHTML=svgUse('ico-gem');else if(type==='mine')c.innerHTML=svgUse('ico-mine');else if(type==='exploded')c.innerHTML=svgUse('ico-boom');}
function setGridDisabled(v){document.querySelectorAll('.cell.hidden').forEach(c=>{c.style.pointerEvents=v?'none':'';});}
function multBet(f){const i=document.getElementById('bet-input');i.value=Math.max(100,Math.round(parseFloat(i.value||500)*f));}
function setBetAll(){document.getElementById('bet-input').value=Math.floor(sharedBalance);}

// ── КРАШ ──
let CC = {
  phase: 'waiting',
  mult: 1, targetCrash: 2,
  betPlaced: false, cashedOut: false,
  bet: 500, cashoutMult: null,
  gameId: null,
  startTime: null, animId: null, waitTimer: null,
  points: [],
  history: [],
};

let cCanvas, cCtx, cW, cH;

function initCrash(){
  cCanvas = document.getElementById('crash-canvas');
  cCtx = cCanvas.getContext('2d');
  const wrap = cCanvas.parentElement;
  cCanvas.width = wrap.clientWidth * window.devicePixelRatio;
  cCanvas.height = wrap.clientHeight * window.devicePixelRatio;
  cCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
  cW = wrap.clientWidth; cH = wrap.clientHeight;

  // Если мини-апп был закрыт/перезапущен посреди раунда — ставка оставалась
  // "зависшей" на сервере и деньги не возвращались. Проверяем и возвращаем.
  apiCall('GET','/api/crash/state').then(r=>{
    if(r.ok && r.refunded){
      sharedBalance = r.new_balance; syncBalanceUI();
      document.getElementById('crash-balance-val').textContent=fmt(sharedBalance);
      showToast('Незавершённая ставка '+fmt(r.refund_amount)+' 🪙 возвращена');
      CC.betPlaced=false; CC.cashedOut=false; CC.gameId=null;
      updateCrashBtn();
    }
  }).catch(()=>{});

  // Загружаем историю с сервера
  apiCall('GET','/api/crash/history').then(r=>{
    if(r.ok && r.history) CC.history = r.history;
    renderCrashHistory();
  }).catch(()=>renderCrashHistory());
  if(CC.phase === 'waiting' && !CC.waitTimer) scheduleCrash();
  else if(CC.phase === 'flying') animateCrash();
  updateCrashBtn();
}

let crashCountdownTimer=null;
function startCrashCountdown(durationMs, label){
  clearInterval(crashCountdownTimer);
  const wrap=document.getElementById('crash-countdown-wrap');
  const fill=document.getElementById('crash-countdown-fill');
  const txt=document.getElementById('crash-countdown-txt');
  const start=performance.now();
  wrap.style.display='flex';
  const tick=()=>{
    const elapsed=performance.now()-start;
    const left=Math.max(0,durationMs-elapsed);
    const pct=Math.max(0,Math.min(1,1-elapsed/durationMs));
    fill.style.width=(pct*100)+'%';
    txt.textContent=label+' '+(left/1000).toFixed(1)+'с';
    if(left<=0) clearInterval(crashCountdownTimer);
  };
  tick();
  crashCountdownTimer=setInterval(tick,100);
}
function stopCrashCountdown(){
  clearInterval(crashCountdownTimer);
  document.getElementById('crash-countdown-wrap').style.display='none';
}

function scheduleCrash(){
  CC.phase='waiting'; CC.mult=1; CC.betPlaced=false; CC.cashedOut=false;
  CC.cashoutMult=null; CC.points=[];
  setBigVal('waiting','ОЖИДАНИЕ РАУНДА...');
  document.getElementById('crash-rocket').style.display='none';
  document.getElementById('crash-payout-bar').style.display='none';
  drawCrashGraph();
  updateCrashBtn();
  const wait = 4000+Math.random()*2000;
  startCrashCountdown(wait, 'Старт через');
  CC.waitTimer = setTimeout(()=>{CC.waitTimer=null;launchCrash();}, wait);
}

function launchCrash(){
  CC.phase='flying'; CC.startTime=performance.now(); CC.points=[[0,1]];
  const r=Math.random();
  CC.targetCrash = r<0.45 ? 1.01+Math.random()*0.99
                 : r<0.70 ? 2+Math.random()*3
                 : r<0.88 ? 5+Math.random()*10
                 : 15+Math.random()*30;
  CC.targetCrash = Math.max(1.01, CC.targetCrash);
  document.getElementById('crash-rocket').style.display='block';
  stopCrashCountdown();
  updateCrashBtn();
  animateCrash();
}

function animateCrash(){
  if(CC.phase!=='flying')return;
  const t=(performance.now()-CC.startTime)/1000;
  CC.mult = Math.pow(Math.E, 0.06*t*5);
  CC.points.push([t, CC.mult]);

  // авто-вывод
  const av=parseFloat(document.getElementById('crash-auto-inp').value);
  if(CC.betPlaced&&!CC.cashedOut&&!isNaN(av)&&av>=1.01&&CC.mult>=av) doCashout();

  if(CC.mult>=CC.targetCrash){ doCrash(); return; }

  const bigEl=document.getElementById('crash-big-val');
  bigEl.textContent='×'+CC.mult.toFixed(2);
  bigEl.className='crash-big-val flying';
  bigEl.style.color=multColor(CC.mult);
  bigEl.style.textShadow=`0 0 30px ${multColor(CC.mult,0.7)}, 0 0 60px ${multColor(CC.mult,0.35)}`;
  if(CC.betPlaced&&!CC.cashedOut){
    const btn=document.getElementById('crash-main-btn');
    btn.textContent=`💰 Забрать ×${CC.mult.toFixed(2)}`;
    // живой счётчик суммы
    const bar=document.getElementById('crash-payout-bar');
    const val=document.getElementById('crash-payout-val');
    bar.style.display='flex';
    val.textContent=fmt(Math.round(CC.bet*CC.mult))+' 🪙';
  } else if(CC.cashedOut){
    document.getElementById('crash-payout-bar').style.display='none';
  }
  drawCrashGraph();
  moveRocket();
  CC.animId=requestAnimationFrame(animateCrash);
}

function doCrash(){
  cancelAnimationFrame(CC.animId);
  CC.phase='crashed';
  if(CC.betPlaced&&!CC.cashedOut){
    tg?.HapticFeedback?.notificationOccurred('error');
    if(CC.gameId){
      apiCall('POST','/api/crash/result',{game_id:CC.gameId, crash_point:CC.mult}).then(r=>{
        if(r.ok){ sharedBalance=Math.max(0,sharedBalance); syncBalanceUI(); }
        // История обновится на следующем открытии
      }).catch(()=>{});
    }
    sharedBalance=Math.max(0,sharedBalance-CC.bet); syncBalanceUI();
    showResult(false,CC.bet,CC.mult);
  }
  CC.history.unshift(+CC.mult.toFixed(2));
  if(CC.history.length>15)CC.history.pop();
  setBigVal('crashed','×'+CC.mult.toFixed(2));
  drawCrashGraph();
  document.getElementById('crash-rocket').style.display='none';
  renderCrashHistory();
  updateCrashBtn();
  const field=document.querySelector('.crash-field');
  field.classList.add('shake','flash');
  setTimeout(()=>field.classList.remove('shake','flash'), 450);
  const cooldown = 3500;
  startCrashCountdown(cooldown, 'Новый раунд через');
  setTimeout(()=>scheduleCrash(), cooldown);
}

function doCashout(){
  if(CC.cashedOut) return;
  CC.cashedOut=true; CC.cashoutMult=CC.mult;
  document.getElementById('crash-payout-bar').style.display='none';
  tg?.HapticFeedback?.notificationOccurred('success');
  updateCrashBtn();
  apiCall('POST','/api/crash/cashout',{game_id:CC.gameId, mult:CC.mult}).then(r=>{
    if(!r.ok){
      // Краш уже был — проигрыш
      showResult(false, CC.bet, CC.mult);
      sharedBalance=Math.max(0,sharedBalance); syncBalanceUI();
      return;
    }
    sharedBalance=r.new_balance; syncBalanceUI();
    showResult(true, r.profit, CC.mult);
  }).catch(()=>{
    // Оффлайн fallback
    const win=Math.round(CC.bet*CC.mult);
    sharedBalance+=win; syncBalanceUI();
    showResult(true, win-CC.bet, CC.mult);
  });
}

function crashMainAction(){
  if(CC.phase==='flying'&&CC.betPlaced&&!CC.cashedOut){ doCashout(); return; }
  if(CC.phase!=='waiting'||CC.betPlaced){ showToast('Дождись начала нового раунда'); return; }
  const bet=parseFloat(document.getElementById('crash-bet-input').value);
  if(!bet||bet<100){showToast('Мин. ставка 100');return;}
  if(bet>sharedBalance){showToast('Недостаточно средств');return;}
  // Ставка через API — списываем реально
  apiCall('POST','/api/crash/start',{bet}).then(r=>{
    if(!r.ok){showToast(r.error||'Ошибка');return;}
    CC.bet=bet; CC.betPlaced=true; CC.cashedOut=false; CC.gameId=r.game_id;
    sharedBalance-=bet; syncBalanceUI();
    updateCrashBtn();
    showToast('Ставка принята!');
  }).catch(()=>showToast('Ошибка соединения'));
}

function updateCrashBtn(){
  const btn=document.getElementById('crash-main-btn');
  btn.className='crash-main-btn';
  if(CC.phase==='waiting'&&CC.betPlaced){
    // ставка уже принята, ждём старта ракеты
    btn.classList.add('cmb-placed');
    btn.textContent='✅ Ставка принята';
    btn.disabled=true;
  } else if(CC.phase==='flying'&&CC.betPlaced&&!CC.cashedOut){
    // единственное активное состояние помимо самой ставки — кешаут
    btn.classList.add('cmb-cashout');
    btn.textContent=`💰 Забрать ×${CC.mult.toFixed(2)}`;
    btn.disabled=false;
  } else if(CC.phase==='flying'){
    btn.classList.add('cmb-waiting');
    btn.textContent='🔒 Раунд идёт...';
    btn.disabled=true;
  } else if(CC.phase==='crashed'){
    // раунд завершился, но новый ещё не открылся — ставить нельзя
    btn.classList.add('cmb-waiting');
    btn.textContent='🔒 Раунд завершён...';
    btn.disabled=true;
  } else if(CC.phase==='waiting'&&!CC.betPlaced){
    // единственное окно, когда реально можно поставить
    btn.classList.add('cmb-ready');
    btn.textContent='🚀 Поставить';
    btn.disabled=false;
  } else {
    btn.classList.add('cmb-waiting');
    btn.textContent='🔒 Ожидание...';
    btn.disabled=true;
  }
}

function setBigVal(phase, text){
  const el=document.getElementById('crash-big-val');
  el.textContent=text;
  el.className='crash-big-val '+phase;
}

// Цвет: жёлтый → зелёный → синий → фиолетовый
function multColor(m, alpha){
  let r,g,b;
  if(m<1.5)      {r=251;g=191;b=36;}   // жёлтый
  else if(m<5)   {r=52; g=211;b=153;}  // зелёный
  else if(m<10)  {r=96; g=165;b=250;}  // синий
  else           {r=139;g=92; b=246;}  // фиолетовый
  return alpha!=null?`rgba(${r},${g},${b},${alpha})`:`rgb(${r},${g},${b})`;
}

function drawCrashGraph(){
  if(!cCtx)return;
  cCtx.clearRect(0,0,cW,cH);

  const pts=CC.points;
  if(pts.length<2){return;}

  const crashed=CC.phase==='crashed';
  const curM=CC.mult;
  // После краша всегда красный
  const lineCol=crashed?'#f87171':multColor(curM);
  const lineGlow=crashed?'rgba(248,113,113,.7)':multColor(curM,0.6);

  const maxT=Math.max(pts[pts.length-1][0],3);
  const maxM=Math.max(pts[pts.length-1][1],2);
  const pL=38, pR=14, pT=18, pB=28;
  const toX=t=>pL+(t/maxT)*(cW-pL-pR);
  const toY=m=>cH-pB-((m-1)/(maxM-1+0.001))*(cH-pT-pB);

  // сетка
  cCtx.strokeStyle='rgba(80,50,140,0.18)'; cCtx.lineWidth=1;
  for(let i=1;i<=4;i++){
    const y=pT+(i/4)*(cH-pT-pB);
    cCtx.beginPath();cCtx.moveTo(pL,y);cCtx.lineTo(cW-pR,y);cCtx.stroke();
    const mv=1+((maxM-1)*(4-i)/4);
    cCtx.fillStyle='rgba(120,90,200,0.45)';cCtx.font='10px system-ui';
    cCtx.fillText('×'+mv.toFixed(2),2,y+4);
  }

  // заливка под кривой
  const fillGrad=cCtx.createLinearGradient(0,pT,0,cH);
  fillGrad.addColorStop(0, multColor(curM, crashed?0.22:0.18));
  fillGrad.addColorStop(1, multColor(curM, 0.02));
  cCtx.beginPath();
  cCtx.moveTo(toX(pts[0][0]),cH-pB);
  pts.forEach(p=>cCtx.lineTo(toX(p[0]),toY(p[1])));
  cCtx.lineTo(toX(pts[pts.length-1][0]),cH-pB);
  cCtx.closePath();
  cCtx.fillStyle=fillGrad; cCtx.fill();

  // сама линия с градиентом по цвету
  cCtx.beginPath();
  pts.forEach((p,i)=>i===0?cCtx.moveTo(toX(p[0]),toY(p[1])):cCtx.lineTo(toX(p[0]),toY(p[1])));
  cCtx.strokeStyle=lineCol;
  cCtx.lineWidth=3; cCtx.lineJoin='round';
  cCtx.shadowColor=lineGlow; cCtx.shadowBlur=14;
  cCtx.stroke(); cCtx.shadowBlur=0;

  // линия кешаута
  if(CC.cashedOut&&CC.cashoutMult){
    const cy=toY(CC.cashoutMult);
    cCtx.setLineDash([5,5]);
    cCtx.strokeStyle='rgba(52,211,153,.65)'; cCtx.lineWidth=1.5;
    cCtx.beginPath();cCtx.moveTo(pL,cy);cCtx.lineTo(cW-pR,cy);cCtx.stroke();
    cCtx.setLineDash([]);
    cCtx.fillStyle='#34d399'; cCtx.font='bold 11px system-ui';
    cCtx.fillText('×'+CC.cashoutMult.toFixed(2),pL+4,cy-5);
  }
}

function moveRocket(){
  if(!cCanvas||CC.points.length<2)return;
  const pts=CC.points;
  const maxT=Math.max(pts[pts.length-1][0],3);
  const maxM=Math.max(pts[pts.length-1][1],2);
  const pL=40,pR=16,pT=20,pB=32;
  const toX=t=>pL+(t/maxT)*(cW-pL-pR);
  const toY=m=>cH-pB-((m-1)/(maxM-1+0.001))*(cH-pT-pB);
  const last=pts[pts.length-1];
  const r=document.getElementById('crash-rocket');
  r.style.left=toX(last[0])+'px'; r.style.top=toY(last[1])+'px';
}

function renderCrashHistory(){
  const el=document.getElementById('crash-history-bar');
  if(!el)return;
  el.innerHTML='';
  CC.history.forEach(m=>{
    const d=document.createElement('div');
    d.className='ch-item '+(m<1.5?'low':m<3?'mid':m<10?'high':'mega');
    d.textContent=m.toFixed(2)+'×';
    el.appendChild(d);
  });
}

function crashSetBet(fn){const i=document.getElementById('crash-bet-input');i.value=Math.max(100,Math.round(fn(parseFloat(i.value)||500)));}
function crashSetBetFixed(v){document.getElementById('crash-bet-input').value=v;}
function crashBetAll(){document.getElementById('crash-bet-input').value=Math.floor(sharedBalance);}

// ── ОБЩЕЕ ──
function syncBalanceUI(){
  document.getElementById('menu-balance-val').textContent=fmt(sharedBalance);
  const mv=document.getElementById('mines-balance-val');if(mv)mv.textContent=fmt(sharedBalance);
  const cv=document.getElementById('crash-balance-val');if(cv)cv.textContent=fmt(sharedBalance);
}

let resultTimer=null;
function clearResultToast(){clearTimeout(resultTimer);document.getElementById('result-overlay').classList.remove('show');}
function showResult(win,profit,mult){
  document.getElementById('res-icon').textContent=win?'💎':'💥';
  const t=document.getElementById('res-title');t.textContent=win?'Победа!':'Краш!';t.className='result-title '+(win?'win':'lose');
  const a=document.getElementById('res-amt');a.textContent=(win?'+':'-')+fmt(Math.abs(Math.round(profit)))+' 🪙';a.className='result-amt '+(win?'win':'lose');
  document.getElementById('res-mult').textContent=win?`множитель ×${mult.toFixed(2)}`:'Удачи в следующий раз!';
  document.getElementById('result-overlay').classList.add('show');
  clearTimeout(resultTimer);
  resultTimer=setTimeout(()=>{document.getElementById('result-overlay').classList.remove('show');if(!MS.playing){buildGrid();MS.gameId=null;MS.gemsFound=0;MS.revealed=[];}},3000);
}
function fmt(n){return Math.round(n).toLocaleString('ru-RU');}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

document.addEventListener('DOMContentLoaded',async()=>{await loadBalance();});
